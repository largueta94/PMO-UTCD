<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestión de Proyectos</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --purple: #7F77DD; --purple-light: #EEEDFE; --purple-dark: #534AB7;
    --green-light: #EAF3DE; --green: #3B6D11;
    --amber-light: #FAEEDA; --amber: #854F0B;
    --red-light: #FCEBEB; --red: #A32D2D;
    --gray-bg: #F8F7F4; --border: #E5E3DC;
    --text: #1A1A18; --text-muted: #6B6A64; --text-hint: #9A9991;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; }

  /* AUTH */
  #auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .auth-card { background: #fff; border: 0.5px solid var(--border); border-radius: 16px; padding: 2rem; width: 100%; max-width: 380px; }
  .auth-card h1 { font-size: 20px; font-weight: 500; margin-bottom: 6px; }
  .auth-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 1.5rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 5px; }
  .field input { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; background: #fff; color: var(--text); }
  .field input:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-light); }
  .btn { width: 100%; padding: 10px; background: var(--purple); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
  .btn:hover { background: var(--purple-dark); }
  .btn-secondary { background: transparent; color: var(--text); border: 0.5px solid var(--border); margin-top: 8px; }
  .btn-secondary:hover { background: var(--gray-bg); }
  .auth-toggle { text-align: center; margin-top: 1rem; font-size: 13px; color: var(--text-muted); }
  .auth-toggle a { color: var(--purple); cursor: pointer; text-decoration: none; }
  .msg { font-size: 13px; padding: 8px 12px; border-radius: 8px; margin-bottom: 1rem; }
  .msg.error { background: var(--red-light); color: var(--red); }
  .msg.success { background: var(--green-light); color: var(--green); }

  /* APP LAYOUT */
  #app-screen { display: none; }
  .topbar { background: #fff; border-bottom: 0.5px solid var(--border); padding: 0 1.5rem; height: 56px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 15px; font-weight: 500; color: var(--text); }
  .logo span { color: var(--purple); }
  .user-info { font-size: 13px; color: var(--text-muted); }
  .logout-btn { font-size: 13px; color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 6px 10px; border-radius: 6px; }
  .logout-btn:hover { background: var(--gray-bg); color: var(--text); }
  .main { max-width: 1100px; margin: 0 auto; padding: 1.5rem; }

  /* METRICS */
  .metrics { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
  .metric { background: #fff; border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; }
  .metric .lbl { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .metric .val { font-size: 24px; font-weight: 500; }

  /* SECTIONS */
  .section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
  .section-head h2 { font-size: 16px; font-weight: 500; }
  .add-btn { background: var(--purple); color: #fff; border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .add-btn:hover { background: var(--purple-dark); }

  /* PROJECTS */
  .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; margin-bottom: 2rem; }
  .proj-card { background: #fff; border: 0.5px solid var(--border); border-radius: 14px; padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s; }
  .proj-card:hover { border-color: var(--purple); }
  .proj-card.active-proj { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-light); }
  .proj-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .proj-name { font-size: 14px; font-weight: 500; }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 20px; white-space: nowrap; }
  .badge.activo { background: var(--purple-light); color: var(--purple-dark); }
  .badge.pausado { background: var(--amber-light); color: var(--amber); }
  .badge.completado { background: var(--green-light); color: var(--green); }
  .proj-client { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .proj-desc { font-size: 12px; color: var(--text-hint); margin-bottom: 10px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .proj-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 8px; border-top: 0.5px solid var(--border); }
  .proj-date { font-size: 11px; color: var(--text-hint); }
  .delete-btn { font-size: 11px; color: var(--text-hint); background: none; border: none; cursor: pointer; padding: 2px 6px; border-radius: 4px; }
  .delete-btn:hover { background: var(--red-light); color: var(--red); }
  .empty { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 14px; background: #fff; border: 0.5px dashed var(--border); border-radius: 12px; }

  /* TASKS */
  .tasks-section { background: #fff; border: 0.5px solid var(--border); border-radius: 14px; padding: 1.25rem; }
  .tasks-section h3 { font-size: 15px; font-weight: 500; margin-bottom: 1rem; }
  .task-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .task-check { width: 18px; height: 18px; border-radius: 5px; border: 0.5px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; background: #fff; }
  .task-check.done { background: var(--purple); border-color: var(--purple); color: #fff; }
  .task-info { flex: 1; }
  .task-title { font-size: 13px; color: var(--text); }
  .task-title.done { text-decoration: line-through; color: var(--text-hint); }
  .task-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .prio { font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .prio.alta { background: var(--red-light); color: var(--red); }
  .prio.media { background: var(--amber-light); color: var(--amber); }
  .prio.baja { background: var(--green-light); color: var(--green); }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: #fff; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 420px; }
  .modal h2 { font-size: 17px; font-weight: 500; margin-bottom: 1.25rem; }
  .modal .field input, .modal .field select, .modal .field textarea { width: 100%; padding: 9px 12px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; background: #fff; color: var(--text); font-family: inherit; }
  .modal .field textarea { resize: vertical; min-height: 70px; }
  .modal .field input:focus, .modal .field select:focus, .modal .field textarea:focus { border-color: var(--purple); box-shadow: 0 0 0 3px var(--purple-light); }
  .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
  .modal-actions .btn { flex: 1; }
  .loading { text-align: center; padding: 2rem; color: var(--text-muted); }

  @media (max-width: 600px) {
    .metrics { grid-template-columns: 1fr 1fr; }
    .topbar { padding: 0 1rem; }
    .main { padding: 1rem; }
  }
</style>
</head>
<body>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-card">
    <h1>⚡ Gestión de Proyectos</h1>
    <p id="auth-subtitle">Ingresa a tu cuenta para continuar</p>
    <div id="auth-msg"></div>
    <div class="field">
      <label>Correo electrónico</label>
      <input type="email" id="auth-email" placeholder="tu@correo.com">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="auth-password" placeholder="••••••••">
    </div>
    <div id="auth-name-field" class="field" style="display:none">
      <label>Tu nombre</label>
      <input type="text" id="auth-name" placeholder="Juan Pérez">
    </div>
    <button class="btn" id="auth-submit-btn" onclick="authSubmit()">Ingresar</button>
    <div class="auth-toggle">
      <span id="auth-toggle-text">¿No tienes cuenta?</span>
      <a onclick="toggleAuthMode()"> <span id="auth-toggle-link">Regístrate</span></a>
    </div>
  </div>
</div>

<!-- APP SCREEN -->
<div id="app-screen">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo">⚡ <span>Proyectos</span></div>
    </div>
    <div style="display:flex;align-items:center;gap:12px">
      <span class="user-info" id="user-display"></span>
      <button class="logout-btn" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="main">
    <div class="metrics">
      <div class="metric"><div class="lbl">Proyectos</div><div class="val" id="m-projects">0</div></div>
      <div class="metric"><div class="lbl">Tareas activas</div><div class="val" id="m-tasks">0</div></div>
      <div class="metric"><div class="lbl">Completadas</div><div class="val" id="m-done">0</div></div>
    </div>

    <div class="section-head">
      <h2>Proyectos</h2>
      <button class="add-btn" onclick="openProjectModal()">+ Nuevo proyecto</button>
    </div>
    <div id="projects-container" class="projects-grid">
      <div class="loading">Cargando proyectos...</div>
    </div>

    <div id="tasks-section" style="display:none">
      <div class="section-head">
        <h2 id="tasks-section-title">Tareas</h2>
        <button class="add-btn" onclick="openTaskModal()">+ Nueva tarea</button>
      </div>
      <div class="tasks-section">
        <div id="tasks-container"><div class="loading">Cargando tareas...</div></div>
      </div>
    </div>
  </div>
</div>

<!-- PROJECT MODAL -->
<div class="modal-overlay" id="project-modal">
  <div class="modal">
    <h2>Nuevo proyecto</h2>
    <div class="field"><label>Nombre del proyecto *</label><input type="text" id="p-name" placeholder="Ej: Subestación Norte"></div>
    <div class="field"><label>Cliente</label><input type="text" id="p-client" placeholder="Ej: ENEE"></div>
    <div class="field"><label>Descripción</label><textarea id="p-desc" placeholder="Breve descripción del proyecto..."></textarea></div>
    <div class="field"><label>Fecha límite</label><input type="date" id="p-date"></div>
    <div class="field"><label>Estado</label>
      <select id="p-status">
        <option value="activo">Activo</option>
        <option value="pausado">Pausado</option>
        <option value="completado">Completado</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('project-modal')">Cancelar</button>
      <button class="btn" onclick="saveProject()">Guardar proyecto</button>
    </div>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="task-modal">
  <div class="modal">
    <h2>Nueva tarea</h2>
    <div class="field"><label>Título de la tarea *</label><input type="text" id="t-title" placeholder="Ej: Revisar planos eléctricos"></div>
    <div class="field"><label>Responsable</label><input type="text" id="t-assigned" placeholder="Ej: Ing. Martínez"></div>
    <div class="field"><label>Prioridad</label>
      <select id="t-priority">
        <option value="alta">Alta</option>
        <option value="media">Media</option>
        <option value="baja">Baja</option>
      </select>
    </div>
    <div class="field"><label>Estado</label>
      <select id="t-status">
        <option value="pendiente">Pendiente</option>
        <option value="en progreso">En progreso</option>
        <option value="completado">Completado</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal('task-modal')">Cancelar</button>
      <button class="btn" onclick="saveTask()">Guardar tarea</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://sucbihsncxcaytwixbfh.supabase.co';
const SUPABASE_KEY = 'sb_publishable_xa1LYBqA7oRmLIvea7n1qQ_XjY-wWg9';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let selectedProjectId = null;
let isLoginMode = true;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    showApp();
  }
}

function toggleAuthMode() {
  isLoginMode = !isLoginMode;
  document.getElementById('auth-subtitle').textContent = isLoginMode ? 'Ingresa a tu cuenta para continuar' : 'Crea tu cuenta nueva';
  document.getElementById('auth-submit-btn').textContent = isLoginMode ? 'Ingresar' : 'Registrarse';
  document.getElementById('auth-toggle-text').textContent = isLoginMode ? '¿No tienes cuenta?' : '¿Ya tienes cuenta?';
  document.getElementById('auth-toggle-link').textContent = isLoginMode ? 'Regístrate' : 'Inicia sesión';
  document.getElementById('auth-name-field').style.display = isLoginMode ? 'none' : 'block';
  document.getElementById('auth-msg').innerHTML = '';
}

function showAuthMsg(text, type) {
  document.getElementById('auth-msg').innerHTML = `<div class="msg ${type}">${text}</div>`;
}

async function authSubmit() {
  const email = document.getElementById('auth-email').value.trim();
  const password = document.getElementById('auth-password').value;
  if (!email || !password) return showAuthMsg('Por favor completa todos los campos.', 'error');

  if (isLoginMode) {
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if (error) return showAuthMsg('Credenciales incorrectas. Verifica tu correo y contraseña.', 'error');
    currentUser = data.user;
    showApp();
  } else {
    const name = document.getElementById('auth-name').value.trim();
    if (!name) return showAuthMsg('Por favor ingresa tu nombre.', 'error');
    const { data, error } = await sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    if (error) return showAuthMsg('Error al crear cuenta: ' + error.message, 'error');
    showAuthMsg('¡Cuenta creada! Ya puedes ingresar.', 'success');
    setTimeout(() => { isLoginMode = true; toggleAuthMode(); }, 1500);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') authSubmit();
});

function showApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  const name = currentUser.user_metadata?.full_name || currentUser.email;
  document.getElementById('user-display').textContent = name;
  loadProjects();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

async function loadProjects() {
  const { data, error } = await sb.from('projects').select('*').order('created_at', { ascending: false });
  const container = document.getElementById('projects-container');
  if (error || !data || data.length === 0) {
    container.innerHTML = '<div class="empty">No hay proyectos aún. ¡Crea el primero!</div>';
    updateMetrics([], []);
    return;
  }
  container.innerHTML = data.map(p => `
    <div class="proj-card ${selectedProjectId === p.id ? 'active-proj' : ''}" onclick="selectProject('${p.id}', '${escHtml(p.name)}')">
      <div class="proj-head">
        <span class="proj-name">${escHtml(p.name)}</span>
        <span class="badge ${p.status}">${p.status}</span>
      </div>
      <div class="proj-client">${p.client ? escHtml(p.client) : 'Sin cliente'}</div>
      ${p.description ? `<div class="proj-desc">${escHtml(p.description)}</div>` : ''}
      <div class="proj-footer">
        <span class="proj-date">${p.due_date ? 'Vence: ' + formatDate(p.due_date) : 'Sin fecha límite'}</span>
        <button class="delete-btn" onclick="event.stopPropagation(); deleteProject('${p.id}')">Eliminar</button>
      </div>
    </div>
  `).join('');
  if (selectedProjectId) loadTasks(selectedProjectId);
  loadMetrics();
}

async function loadMetrics() {
  const { data: projects } = await sb.from('projects').select('id');
  const { data: tasks } = await sb.from('tasks').select('status');
  const done = tasks ? tasks.filter(t => t.status === 'completado').length : 0;
  const active = tasks ? tasks.filter(t => t.status !== 'completado').length : 0;
  document.getElementById('m-projects').textContent = projects ? projects.length : 0;
  document.getElementById('m-tasks').textContent = active;
  document.getElementById('m-done').textContent = done;
}

function updateMetrics(projects, tasks) {
  document.getElementById('m-projects').textContent = projects.length;
  document.getElementById('m-tasks').textContent = tasks.filter(t => t.status !== 'completado').length;
  document.getElementById('m-done').textContent = tasks.filter(t => t.status === 'completado').length;
}

function selectProject(id, name) {
  selectedProjectId = id;
  document.getElementById('tasks-section').style.display = 'block';
  document.getElementById('tasks-section-title').textContent = 'Tareas — ' + name;
  loadProjects();
  loadTasks(id);
}

async function loadTasks(projectId) {
  const { data, error } = await sb.from('tasks').select('*').eq('project_id', projectId).order('created_at', { ascending: false });
  const container = document.getElementById('tasks-container');
  if (error || !data || data.length === 0) {
    container.innerHTML = '<div class="empty" style="border:none;padding:1rem 0">No hay tareas en este proyecto. ¡Agrega la primera!</div>';
    return;
  }
  container.innerHTML = data.map(t => `
    <div class="task-item">
      <div class="task-check ${t.status === 'completado' ? 'done' : ''}" onclick="toggleTask('${t.id}', '${t.status}')">
        ${t.status === 'completado' ? '✓' : ''}
      </div>
      <div class="task-info">
        <div class="task-title ${t.status === 'completado' ? 'done' : ''}">${escHtml(t.title)}</div>
        <div class="task-meta">${t.assigned_to ? 'Responsable: ' + escHtml(t.assigned_to) : 'Sin asignar'} · ${t.status}</div>
      </div>
      <span class="prio ${t.priority}">${t.priority}</span>
      <button class="delete-btn" onclick="deleteTask('${t.id}')">×</button>
    </div>
  `).join('');
}

async function toggleTask(id, currentStatus) {
  const newStatus = currentStatus === 'completado' ? 'pendiente' : 'completado';
  await sb.from('tasks').update({ status: newStatus }).eq('id', id);
  loadTasks(selectedProjectId);
  loadMetrics();
}

function openProjectModal() {
  document.getElementById('p-name').value = '';
  document.getElementById('p-client').value = '';
  document.getElementById('p-desc').value = '';
  document.getElementById('p-date').value = '';
  document.getElementById('p-status').value = 'activo';
  document.getElementById('project-modal').classList.add('open');
}

function openTaskModal() {
  if (!selectedProjectId) return alert('Primero selecciona un proyecto.');
  document.getElementById('t-title').value = '';
  document.getElementById('t-assigned').value = '';
  document.getElementById('t-priority').value = 'media';
  document.getElementById('t-status').value = 'pendiente';
  document.getElementById('task-modal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

async function saveProject() {
  const name = document.getElementById('p-name').value.trim();
  if (!name) return alert('El nombre del proyecto es obligatorio.');
  const { error } = await sb.from('projects').insert({
    name,
    client: document.getElementById('p-client').value.trim() || null,
    description: document.getElementById('p-desc').value.trim() || null,
    due_date: document.getElementById('p-date').value || null,
    status: document.getElementById('p-status').value
  });
  if (error) return alert('Error al guardar: ' + error.message);
  closeModal('project-modal');
  loadProjects();
}

async function saveTask() {
  const title = document.getElementById('t-title').value.trim();
  if (!title) return alert('El título de la tarea es obligatorio.');
  const { error } = await sb.from('tasks').insert({
    project_id: selectedProjectId,
    title,
    assigned_to: document.getElementById('t-assigned').value.trim() || null,
    priority: document.getElementById('t-priority').value,
    status: document.getElementById('t-status').value
  });
  if (error) return alert('Error al guardar: ' + error.message);
  closeModal('task-modal');
  loadTasks(selectedProjectId);
  loadMetrics();
}

async function deleteProject(id) {
  if (!confirm('¿Eliminar este proyecto y todas sus tareas?')) return;
  await sb.from('projects').delete().eq('id', id);
  if (selectedProjectId === id) {
    selectedProjectId = null;
    document.getElementById('tasks-section').style.display = 'none';
  }
  loadProjects();
}

async function deleteTask(id) {
  if (!confirm('¿Eliminar esta tarea?')) return;
  await sb.from('tasks').delete().eq('id', id);
  loadTasks(selectedProjectId);
  loadMetrics();
}

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(d) {
  const [y, m, day] = d.split('-');
  return `${day}/${m}/${y}`;
}

document.querySelectorAll('.modal-overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

init();
</script>
</body>
</html>
