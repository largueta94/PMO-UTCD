<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO SGP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--p:#7F77DD;--pl:#EEEDFE;--pd:#534AB7;--tl:#E1F5EE;--tld:#0F6E56;--al:#FAEEDA;--ad:#854F0B;--rl:#FCEBEB;--rd:#A32D2D;--gl:#EAF3DE;--gd:#3B6D11;--bl:#E6F1FB;--bd:#185FA5;--bg:#F7F6F2;--card:#fff;--border:#E8E6DF;--text:#1A1A18;--muted:#6B6A64;--hint:#9A9991;--sidebar:224px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.auth-card{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:380px}
.auth-logo{font-size:22px;font-weight:600;color:var(--p);margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.field{margin-bottom:1rem}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:#fff;color:var(--text);font-family:inherit}
.field textarea{resize:vertical;min-height:72px}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--pl)}
.btn-primary{padding:9px 18px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;transition:background .15s;white-space:nowrap}
.btn-primary:hover{background:var(--pd)}.btn-primary.full{width:100%;padding:10px}
.btn-ghost{background:transparent;border:0.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--text);transition:background .15s}
.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--rd);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px}
.btn-danger:hover{background:#7a1f1f}
.msg{font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:1rem}
.msg.err{background:var(--rl);color:var(--rd)}.msg.ok{background:var(--gl);color:var(--gd)}
.link-btn{background:none;border:none;color:var(--p);font-size:13px;cursor:pointer;padding:0;text-decoration:underline}
.auth-toggle{text-align:center;margin-top:1rem;font-size:13px;color:var(--muted)}
#app-screen{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--card);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:20;overflow-y:auto}
.sidebar-logo{padding:1.1rem 1rem .9rem;border-bottom:0.5px solid var(--border)}
.logo-txt .name{font-size:14px;font-weight:600;color:var(--text)}.logo-txt .sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav-section{padding:.7rem .75rem .2rem;font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.07em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 8px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--bg);color:var(--text)}.nav-item.active{background:var(--pl);color:var(--pd);font-weight:500}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:1rem;border-top:0.5px solid var(--border);flex-shrink:0}
.user-chip{display:flex;align-items:center;gap:9px}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--pl);color:var(--pd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.user-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--muted)}
.logout-btn{margin-left:auto;background:none;border:none;font-size:18px;color:var(--hint);cursor:pointer;padding:4px}
.logout-btn:hover{color:var(--rd)}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--card);border-bottom:0.5px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:500}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{padding:1.5rem;flex:1}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.metric-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px}
.metric-card .lbl{font-size:11px;color:var(--muted);margin-bottom:6px}
.metric-card .val{font-size:26px;font-weight:500}
.metric-card .sub{font-size:11px;color:var(--hint);margin-top:3px}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem}
.card-title{font-size:14px;font-weight:500;margin-bottom:1rem}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.section-head h2{font-size:15px;font-weight:500}
.table-wrap{overflow-x:auto;border-radius:12px;border:0.5px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);border-bottom:0.5px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 14px;font-size:13px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer}tr.clickable:hover td{background:var(--bg)}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap;font-weight:500}
.badge.abierto,.badge.activo,.badge.normal,.badge.aprobado2{background:var(--pl);color:var(--pd)}
.badge.cerrado,.badge.finalizado,.badge.pagado,.badge.aprobado,.badge.mitigado{background:var(--gl);color:var(--gd)}
.badge.riesgo,.badge.pendiente,.badge.rechazado,.badge.vencido,.badge.materializado,.badge.enriesgo{background:var(--rl);color:var(--rd)}
.badge.pausado,.badge.proceso,.badge.en_proceso,.badge.entramite,.badge.enseguimiento,.badge.contrato,.badge.con_reporte{background:var(--al);color:var(--ad)}
.badge.fotografico,.badge.compra_directa,.badge.compra{background:var(--tl);color:var(--tld)}
.badge.identificado,.badge.pm{background:var(--bl);color:var(--bd)}
.badge.coordinador{background:var(--pl);color:var(--pd)}.badge.lider{background:var(--gl);color:var(--gd)}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:5px;background:var(--border);border-radius:4px;overflow:hidden;min-width:60px}
.prog-fill{height:100%;border-radius:4px;background:var(--p);transition:width .3s}
.prog-fill.green{background:#639922}.prog-fill.amber{background:#BA7517}.prog-fill.red{background:var(--rd)}
.prog-pct{font-size:12px;color:var(--muted);min-width:34px;text-align:right}
.tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab-btn{padding:9px 16px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--p);border-bottom-color:var(--p);font-weight:500}
.tab-btn:hover:not(.active){color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-grid .full{grid-column:1/-1}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border)}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal-wrap.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:560px;padding:1.5rem;position:relative;margin:auto}
.modal-xl{max-width:960px}.modal-lg{max-width:760px}
.modal h2{font-size:17px;font-weight:500;margin-bottom:1.25rem}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:7px 10px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text);outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--p)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.alert.warn{background:var(--al);color:var(--ad)}.alert.info{background:var(--bl);color:var(--bd)}.alert.danger{background:var(--rl);color:var(--rd)}.alert.ok{background:var(--gl);color:var(--gd)}
.detail-header{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.detail-header h1{font-size:18px;font-weight:500;margin-bottom:8px}
.detail-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.meta-chip{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:14px;border:0.5px dashed var(--border);border-radius:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--muted);gap:10px;font-size:14px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem}
.back-btn:hover{color:var(--text)}
.action-row{display:flex;gap:4px}
.icon-btn{background:none;border:0.5px solid transparent;border-radius:6px;padding:4px 8px;font-size:12px;color:var(--hint);cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--bg);border-color:var(--border);color:var(--text)}
.icon-btn.del:hover{background:var(--rl);color:var(--rd)}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.photo-card{border-radius:10px;overflow:hidden;border:0.5px solid var(--border);background:var(--card)}
.photo-card img{width:100%;height:140px;object-fit:cover;display:block}
.photo-card .photo-info{padding:10px}
.perm-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;margin-right:4px}
.perm-dot.aprobado{background:var(--gd)}.perm-dot.pendiente,.perm-dot.notramite{background:var(--hint)}
.perm-dot.entramite{background:var(--ad)}.perm-dot.rechazado,.perm-dot.vencido{background:var(--rd)}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.main{margin-left:0}.metric-grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="toast" id="toast"></div>
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-logo"><img id="auth-logo-img" src="" style="height:48px;object-fit:contain;display:none"><span id="auth-logo-txt">⚡ PMO</span></div>
    <p class="auth-sub" id="auth-sub-txt">Ingresa a tu cuenta</p>
    <div id="auth-msg"></div>
    <div id="m-login">
      <div class="field"><label>Correo</label><input type="email" id="l-email" placeholder="tu@correo.com"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••••"></div>
      <button class="btn-primary full" onclick="doLogin()">Ingresar</button>
      <div style="text-align:center;margin-top:10px"><button class="link-btn" onclick="showMode('reset')">¿Olvidaste tu contraseña?</button></div>
      <div class="auth-toggle">¿No tienes cuenta? <button class="link-btn" onclick="showMode('reg')">Regístrate</button></div>
    </div>
    <div id="m-reg" style="display:none">
      <div class="field"><label>Nombre completo</label><input type="text" id="r-name" placeholder="Juan Pérez"></div>
      <div class="field"><label>Correo</label><input type="email" id="r-email" placeholder="tu@correo.com"></div>
      <div class="field"><label>Contraseña</label><input type="password" id="r-pass" placeholder="Mínimo 6 caracteres"></div>
      <button class="btn-primary full" onclick="doRegister()">Crear cuenta</button>
      <div class="auth-toggle">¿Ya tienes cuenta? <button class="link-btn" onclick="showMode('login')">Inicia sesión</button></div>
    </div>
    <div id="m-reset" style="display:none">
      <p style="font-size:13px;color:var(--muted);margin-bottom:1rem">Ingresa tu correo y te enviaremos un enlace.</p>
      <div class="field"><label>Correo</label><input type="email" id="rst-email" placeholder="tu@correo.com"></div>
      <button class="btn-primary full" onclick="doReset()">Enviar enlace</button>
      <div class="auth-toggle"><button class="link-btn" onclick="showMode('login')">← Volver</button></div>
    </div>
  </div>
</div>
<div id="app-screen">
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <img id="sidebar-logo-img" src="" style="max-height:44px;max-width:180px;object-fit:contain;display:none">
        <div id="sidebar-logo-txt" class="logo-txt"><div class="name" id="sys-name-el">⚡ PMO SGP</div><div class="sub" id="sys-sub-el">UTCD — ENEE</div></div>
      </div>
      <div style="flex:1;overflow-y:auto;padding-bottom:1rem">
        <div class="nav-section">Principal</div>
        <button class="nav-item" data-view="dashboard"     onclick="nav('dashboard')"><span class="nav-icon">📊</span>Dashboard</button>
        <button class="nav-item" data-view="proyectos"     onclick="nav('proyectos')"><span class="nav-icon">📁</span>Proyectos</button>
        <button class="nav-item" data-view="adquisiciones" onclick="nav('adquisiciones')"><span class="nav-icon">📋</span>Adquisiciones</button>
        <div class="nav-section">Gestión</div>
        <button class="nav-item" data-view="actualizaciones" onclick="nav('actualizaciones')"><span class="nav-icon">📝</span>Actualizaciones</button>
        <button class="nav-item" data-view="visitas"         onclick="nav('visitas')"><span class="nav-icon">🏗️</span>Visitas técnicas</button>
        <button class="nav-item" data-view="mapa"            onclick="nav('mapa')"><span class="nav-icon">🗺️</span>Mapa de proyectos</button>
        <div class="nav-section">Organización</div>
        <button class="nav-item" data-view="equipo"      onclick="nav('equipo')"><span class="nav-icon">👥</span>Equipo</button>
        <div class="nav-section" id="nav-admin-sec" style="display:none">Admin</div>
        <button class="nav-item" id="nav-config" style="display:none" data-view="configuracion" onclick="nav('configuracion')"><span class="nav-icon">⚙️</span>Configuración</button>
      </div>
      <div class="sidebar-footer">
        <div class="user-chip">
          <div class="user-av" id="sidebar-av">?</div>
          <div style="flex:1;min-width:0"><div class="user-name" id="sidebar-name">—</div><div class="user-role" id="sidebar-role">—</div></div>
          <button class="logout-btn" onclick="doLogout()" title="Cerrar sesión">⎋</button>
        </div>
      </div>
    </aside>
    <div class="main">
      <div class="topbar">
        <span class="topbar-title" id="topbar-title">Dashboard</span>
        <div class="topbar-actions" id="topbar-actions"></div>
      </div>
      <div class="content" id="main-content"><div class="loading-state"><span class="spinner"></span> Cargando...</div></div>
    </div>
  </div>
</div>
<div class="modal-wrap" id="modal-proyecto"><div class="modal modal-xl" id="modal-proyecto-body"></div></div>
<div class="modal-wrap" id="modal-adq"><div class="modal modal-lg" id="modal-adq-body"></div></div>
<div class="modal-wrap" id="modal-update"><div class="modal" id="modal-update-body"></div></div>
<div class="modal-wrap" id="modal-visita"><div class="modal modal-lg" id="modal-visita-body"></div></div>
<div class="modal-wrap" id="modal-adenda"><div class="modal" id="modal-adenda-body"></div></div>
<div class="modal-wrap" id="modal-pago"><div class="modal" id="modal-pago-body"></div></div>
<div class="modal-wrap" id="modal-confirm"><div class="modal" id="modal-confirm-body"></div></div>
<div class="modal-wrap" id="modal-ficha"><div class="modal modal-lg" id="modal-ficha-body"></div></div>
<div class="modal-wrap" id="modal-evm"><div class="modal modal-xl" id="modal-evm-body"></div></div>
<div class="modal-wrap" id="modal-persona"><div class="modal" id="modal-persona-body"></div></div>
<div class="modal-wrap" id="modal-lista"><div class="modal" id="modal-lista-body"></div></div>
<div class="modal-wrap" id="modal-riesgo"><div class="modal" id="modal-riesgo-body"></div></div>
<div class="modal-wrap" id="modal-interesado"><div class="modal" id="modal-interesado-body"></div></div>
<div class="modal-wrap" id="modal-permiso"><div class="modal" id="modal-permiso-body"></div></div>
<div class="modal-wrap" id="modal-foto"><div class="modal" id="modal-foto-body"></div></div>
<script>
// ═══════════════════════════ CONFIG & STATE ═══════════════════════════
const SURL='https://sucbihsncxcaytwixbfh.supabase.co';
const SKEY='sb_publishable_xa1LYBqA7oRmLIvea7n1qQ_XjY-wWg9';
const sb=supabase.createClient(SURL,SKEY);
const app={user:null,profile:null,view:'dashboard',projectId:null,adqId:null,tab:0,lists:{},config:{}};

const v=id=>(document.getElementById(id)||{}).value||'';
const numv=id=>{const n=parseFloat(v(id));return isNaN(n)?null:n;};
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtNum=n=>Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDate=d=>d?new Date(d+'T00:00:00').toLocaleDateString('es-HN',{day:'2-digit',month:'short',year:'2-digit'}):'—';
const inp=(id,val,type='text',ph='')=>`<input type="${type}" id="${id}" value="${esc(val||'')}" placeholder="${ph}">`;

function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=err?'var(--rd)':'#2C2C2A';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200);
}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}

async function loadLists(){
  const{data}=await sb.from('config_listas').select('*').eq('activo',true).order('orden');
  app.lists={};
  (data||[]).forEach(r=>{if(!app.lists[r.categoria])app.lists[r.categoria]=[];app.lists[r.categoria].push(r.valor);});
}

async function loadConfig(){
  const{data}=await sb.from('config_sistema').select('*');
  app.config={};(data||[]).forEach(r=>app.config[r.clave]=r.valor);
  if(app.config.primary_color){
    document.documentElement.style.setProperty('--p',app.config.primary_color);
    document.documentElement.style.setProperty('--pd',shadeColor(app.config.primary_color,-20));
    document.documentElement.style.setProperty('--pl',shadeColor(app.config.primary_color,80));
  }
  const nm=app.config.system_name||'PMO SGP';
  const sub=app.config.system_sub||'UTCD — ENEE';
  const nel=document.getElementById('sys-name-el');if(nel)nel.textContent=nm;
  const sel=document.getElementById('sys-sub-el');if(sel)sel.textContent=sub;
  document.getElementById('auth-logo-txt').textContent=nm;
  document.title=nm;
  if(app.config.logo_url){
    ['auth-logo-img','sidebar-logo-img'].forEach(id=>{const img=document.getElementById(id);if(img){img.src=app.config.logo_url;img.style.display='block';}});
    document.getElementById('auth-logo-txt').style.display='none';
    document.getElementById('sidebar-logo-txt').style.display='none';
  }
}

function shadeColor(hex,pct){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  if(pct>0){r=Math.min(255,Math.round(r+(255-r)*pct/100));g=Math.min(255,Math.round(g+(255-g)*pct/100));b=Math.min(255,Math.round(b+(255-b)*pct/100));}
  else{r=Math.max(0,Math.round(r*(1+pct/100)));g=Math.max(0,Math.round(g*(1+pct/100)));b=Math.max(0,Math.round(b*(1+pct/100)));}
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function selDyn(id,val,cat,ph='— Seleccionar —'){

const isCoord=()=>app.profile?.role==='coordinador';
const isLider=()=>app.profile?.role==='lider';
const canEdit=proj=>{
  if(isCoord())return true;
  if(isLider())return proj&&proj.lider_id===app.profile?.id;
  return proj&&proj.pm_id===app.profile?.id;
};

// ═══════════════════════════ AUTH ═══════════════════════════
function showMode(m){
  ['login','reg','reset'].forEach(x=>document.getElementById('m-'+x).style.display=x===m?'':'none');
  const t={login:'Ingresa a tu cuenta',reg:'Crea tu cuenta',reset:'Recuperar contraseña'};
  document.getElementById('auth-sub-txt').textContent=t[m]||'';
  document.getElementById('auth-msg').innerHTML='';
}
function authMsg(txt,type='err'){document.getElementById('auth-msg').innerHTML=`<div class="msg ${type}">${txt}</div>`;}
async function doLogin(){
  const email=v('l-email'),pass=v('l-pass');
  if(!email||!pass)return authMsg('Completa todos los campos.');
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)return authMsg('Correo o contraseña incorrectos.');
  app.user=data.user;await loadProfile();showApp();
}
async function doRegister(){
  const name=v('r-name'),email=v('r-email'),pass=v('r-pass');
  if(!name||!email||!pass)return authMsg('Completa todos los campos.');
  if(pass.length<6)return authMsg('Contraseña mínimo 6 caracteres.');
  const{error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error)return authMsg('Error: '+error.message);
  authMsg('¡Cuenta creada! Ya puedes ingresar.','ok');setTimeout(()=>showMode('login'),1800);
}
async function doReset(){
  const email=v('rst-email');if(!email)return authMsg('Ingresa tu correo.');
  const{error}=await sb.auth.resetPasswordForEmail(email);
  if(error)return authMsg('Error: '+error.message);
  authMsg('✅ Correo enviado.','ok');
}
async function doLogout(){await sb.auth.signOut();location.reload();}
async function loadProfile(){
  const{data}=await sb.from('profiles').select('*').eq('id',app.user.id).single();
  app.profile=data||{role:'pm'};
  document.getElementById('sidebar-av').textContent=(app.profile.full_name||'?').charAt(0).toUpperCase();
  document.getElementById('sidebar-name').textContent=app.profile.full_name||app.user.email;
  document.getElementById('sidebar-role').textContent={coordinador:'Coordinador',lider:'Líder',pm:'PM'}[app.profile.role]||app.profile.role;
  if(isCoord()){document.getElementById('nav-admin-sec').style.display='';document.getElementById('nav-config').style.display='';}
}
function showApp(){
  document.getElementById('auth-screen').style.display='none';
  document.getElementById('app-screen').style.display='block';
  nav('dashboard');
}
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const modes={login:doLogin,reg:doRegister,reset:doReset};
  const active=Object.keys(modes).find(k=>document.getElementById('m-'+k).style.display!=='none');
  if(active)modes[active]();
});
(async()=>{
  await loadConfig();
  const{data:{session}}=await sb.auth.getSession();
  if(session?.user){app.user=session.user;await loadProfile();showApp();}
})();

// ═══════════════════════════ NAVIGATION ═══════════════════════════
function nav(view,params={}){
  app.view=view;Object.assign(app,params);
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.toggle('active',el.dataset.view===view||(view==='proyecto_detalle'&&el.dataset.view==='proyectos')));
  document.getElementById('topbar-actions').innerHTML='';
  const titles={dashboard:'Dashboard',proyectos:'Proyectos',proyecto_detalle:'Detalle de proyecto',adquisiciones:'Adquisiciones',actualizaciones:'Actualizaciones',visitas:'Visitas técnicas',equipo:'Equipo',mapa:'Mapa de proyectos',configuracion:'Configuración'};
  document.getElementById('topbar-title').textContent=titles[view]||view;
  render();
}
async function render(){
  document.getElementById('main-content').innerHTML='<div class="loading-state"><span class="spinner"></span> Cargando...</div>';
  await loadLists();
  switch(app.view){
    case'dashboard':       await renderDashboard();break;
    case'proyectos':       await renderProyectos();break;
    case'proyecto_detalle':await renderProyectoDetalle();break;
    case'adquisiciones':   await renderAdquisiciones();break;
    case'actualizaciones': await renderActualizaciones();break;
    case'visitas':         await renderVisitas();break;
    case'equipo':          await renderEquipo();break;
    case'mapa':            await renderMapa();break;
    case'configuracion':   await renderConfiguracion();break;
  }
}

function applyDashFilters(){
  const search=(v('df-search')||'').toLowerCase(),pm=v('df-pm'),estado=v('df-estado'),tipo=v('df-tipo'),zona=v('df-zona');
  const ps=(window._dashProjs||[]).filter(p=>
    (!search||(p.nombre||'').toLowerCase().includes(search)||(p.codigo||'').toLowerCase().includes(search))&&
    (!pm||p.pm_id===pm)&&(!estado||p.estado_general===estado)&&
    (!tipo||p.tipo_proyecto===tipo)&&(!zona||p.zona_enee===zona));
  const us=window._dashUpdates||[];
  const abiertos=ps.filter(p=>p.estado_general==='Abierto').length;
  const riesgo=ps.filter(p=>p.estado_general==='En Riesgo').length;
  const cerrados=ps.filter(p=>p.estado_general==='Cerrado').length;
  const totalInv=ps.reduce((s,p)=>s+(p.inversion_usd||0),0);
  const sevenAgo=new Date();sevenAgo.setDate(sevenAgo.getDate()-7);
  const recentIds=new Set(us.filter(u=>new Date(u.fecha)>=sevenAgo).map(u=>u.proyecto_id));
  const stale=ps.filter(p=>p.estado_general==='Abierto'&&!recentIds.has(p.id));
  const avgAvance=ps.length?Math.round(ps.reduce((s,p)=>s+(p.pct_ejecucion_obra||0),0)/ps.length):0;
  const g={};ps.forEach(p=>{const k=p.estado_general||'Sin estado';g[k]=(g[k]||0)+1;});
  const gt={};ps.forEach(p=>{const k=p.tipo_proyecto||'Sin tipo';gt[k]=(gt[k]||0)+1;});

  document.getElementById('dash-body').innerHTML=`
    <div class="metric-grid">
      <div class="metric-card"><div class="lbl">Proyectos activos</div><div class="val" style="color:var(--p)">${abiertos}</div><div class="sub">${riesgo} en riesgo · ${cerrados} cerrados</div></div>
      <div class="metric-card"><div class="lbl">Inversión total (USD)</div><div class="val">$${fmtNum(totalInv)}</div><div class="sub">${ps.length} proyectos</div></div>
      <div class="metric-card"><div class="lbl">Sin actualizar +7 días</div><div class="val" style="color:${stale.length?'var(--rd)':'var(--gd)'}">${stale.length}</div><div class="sub">de ${abiertos} abiertos</div></div>
      <div class="metric-card"><div class="lbl">Avance promedio obra</div><div class="val">${avgAvance}<span style="font-size:16px">%</span></div><div class="sub">ejecución física</div></div>
    </div>
    ${stale.length?`<div class="card" style="margin-bottom:1.5rem"><div class="card-title" style="color:var(--rd)">⚠️ Proyectos sin actualizar esta semana</div>${stale.slice(0,5).map(p=>`<div class="alert warn" style="cursor:pointer;margin-bottom:6px" onclick="nav('proyecto_detalle',{projectId:'${p.id}'})"><span>📁</span><div><strong>${esc(p.nombre)}</strong><div style="font-size:11px;margin-top:2px">${esc(p.profiles?.full_name||'Sin PM')} · ${esc(p.estado_proyecto||'')}</div></div></div>`).join('')}${stale.length>5?`<div style="font-size:12px;color:var(--muted);margin-top:4px">...y ${stale.length-5} más</div>`:''}</div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem">
      <div class="card"><div class="card-title">Estado de proyectos</div>${Object.entries(g).map(([k,n])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border)"><span class="badge ${k.toLowerCase().replace(/\s/g,'')}">${k}</span><strong>${n}</strong></div>`).join('')||'<div class="empty" style="border:none">Sin datos</div>'}</div>
      <div class="card"><div class="card-title">Por tipo</div>${Object.entries(gt).map(([k,n])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border)"><span>${k}</span><strong>${n}</strong></div>`).join('')||'<div class="empty" style="border:none">Sin datos</div>'}</div>
    </div>
    <div class="card" style="margin-bottom:1.5rem"><div class="card-title">Avance por tipo</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem">
        ${[...new Set(ps.map(p=>p.tipo_proyecto||'Sin tipo'))].map(k=>{const arr=ps.filter(p=>(p.tipo_proyecto||'Sin tipo')===k);const avg=Math.round(arr.reduce((s,p)=>s+(p.pct_ejecucion_obra||0),0)/arr.length);return`<div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:12px;color:var(--muted);margin-bottom:4px">${k}</div><div style="font-size:11px;color:var(--hint);margin-bottom:6px">${arr.length} proyecto${arr.length!==1?'s':''}</div><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill ${avg>=80?'green':avg>=40?'':'amber'}" style="width:${avg}%"></div></div><span class="prog-pct">${avg}%</span></div></div>`;}).join('')}
      </div>
    </div>
    <div class="card"><div class="card-title">Mapa de proyectos filtrados</div><div id="dash-map" style="height:360px;border-radius:8px;overflow:hidden"></div></div>`;
  setTimeout(()=>{
    if(window._dashMap){window._dashMap.remove();window._dashMap=null;}
    const m=L.map('dash-map').setView([14.65,-86.8],7);window._dashMap=m;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(m);
    ps.filter(p=>p.lat&&p.lon).forEach(p=>{
      const col={Abierto:'#639922','En Riesgo':'#A32D2D',Pausado:'#BA7517',Cerrado:'#6B6A64'}[p.estado_general]||'#7F77DD';
      L.circleMarker([p.lat,p.lon],{radius:8,fillColor:col,color:'#fff',weight:2,fillOpacity:.85}).addTo(m)
       .bindPopup(`<strong>${p.nombre}</strong><br>${p.estado_general||''}<br>${p.departamento||''}`);
    });
  },150);
}

async function exportDashPDF(){
  const{jsPDF}=window.jspdf;const doc=new jsPDF();
  const sysName=app.config.system_name||'PMO SGP';
  doc.setFillColor(127,119,221);doc.rect(0,0,210,18,'F');
  doc.setTextColor(255);doc.setFontSize(14);doc.text(sysName,15,12);
  doc.setFontSize(9);doc.text('DASHBOARD',195,12,{align:'right'});
  doc.setTextColor(30);
  const ps=window._dashProjs||[];let y=26;
  doc.setFontSize(10);doc.text(`Total: ${ps.length} | Activos: ${ps.filter(p=>p.estado_general==='Abierto').length} | En riesgo: ${ps.filter(p=>p.estado_general==='En Riesgo').length}`,15,y);y+=6;
  doc.text(`Inversión total: $${fmtNum(ps.reduce((s,p)=>s+(p.inversion_usd||0),0))}`,15,y);y+=10;
  doc.setFontSize(9);doc.setTextColor(80);
  ps.slice(0,50).forEach(p=>{if(y>280){doc.addPage();y=20;}doc.text(`• ${(p.nombre||'').substring(0,55)} — ${p.estado_general||''} — ${p.pct_ejecucion_obra||0}%`,15,y);y+=5;});
  doc.setFontSize(8);doc.setTextColor(150);doc.text(`Generado: ${new Date().toLocaleString('es-HN')}`,15,287);
  doc.save('dashboard_pmo.pdf');
}

function renderProyRows(ps){
  if(!ps.length)return`<tr><td colspan="11"><div class="empty">Sin proyectos. Crea el primero.</div></td></tr>`;
  return ps.map(p=>{
    const pctP=p.pct_avance_proyecto||0,pctO=p.pct_ejecucion_obra||0,pctF=p.pct_avance_financiero||0;
    return`<tr class="clickable" onclick="nav('proyecto_detalle',{projectId:'${p.id}'})">
      <td style="color:var(--muted);font-size:12px">${esc(p.codigo||'—')}</td>
      <td><strong>${esc(p.nombre)}</strong>${p.departamento?`<div style="font-size:11px;color:var(--muted)">${esc(p.departamento)}${p.municipio?', '+esc(p.municipio):''}</div>`:''}</td>
      <td style="font-size:12px">${esc(p.profiles?.full_name||'—')}</td>
      <td style="font-size:11px;color:var(--muted)">${esc(p.estado_proyecto||'—')}</td>
      <td><span class="badge ${(p.estado_general||'').toLowerCase().replace(/\s/g,'')}">${esc(p.estado_general||'—')}</span></td>
      <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pctP}%;background:var(--bd)"></div></div><span class="prog-pct">${pctP}%</span></div></td>
      <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill ${pctO>=80?'green':pctO>=40?'':'amber'}" style="width:${pctO}%"></div></div><span class="prog-pct">${pctO}%</span></div></td>
      <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pctF}%;background:var(--tld)"></div></div><span class="prog-pct">${pctF}%</span></div></td>
      <td style="font-size:11px;color:var(--muted)">${esc(p.tipo_proyecto||'—')}</td>
      <td style="font-size:12px;text-align:right">$${fmtNum(p.inversion_usd||0)}</td>
      <td class="action-row" onclick="event.stopPropagation()">
        ${canEdit(p)?`<button class="icon-btn" onclick="openProyectoForm('${p.id}')">✏️</button>`:''}
        ${isCoord()?`<button class="icon-btn del" onclick="confirmDelete('proyectos','${p.id}')">🗑</button>`:''}
      </td>
    </tr>`;
  }).join('');
}

function filterProy(){
  const s=v('fp-search').toLowerCase(),e=v('fp-estado'),t=v('fp-tipo'),n=v('fp-natural');
  const f=(window._proyData||[]).filter(p=>(!s||(p.nombre||'').toLowerCase().includes(s)||(p.codigo||'').toLowerCase().includes(s))&&(!e||p.estado_general===e)&&(!t||p.tipo_proyecto===t)&&(!n||p.naturaleza===n));
  document.getElementById('tbl-proy-body').innerHTML=renderProyRows(f);
}

function exportarCSV(){
  const ps=window._proyData||[];
  const h=['Código','Nombre','PM','Estado','Etapa','Tipo','Tipificación','Naturaleza','% Proyecto','% Obra','% Financiero','Inversión USD','Depto','Municipio'];
  const rows=ps.map(p=>[p.codigo||'',p.nombre||'',p.profiles?.full_name||'',p.estado_general||'',p.estado_proyecto||'',p.tipo_proyecto||'',p.tipificacion_proyecto||'',p.naturaleza||'',p.pct_avance_proyecto||0,p.pct_ejecucion_obra||0,p.pct_avance_financiero||0,p.inversion_usd||0,p.departamento||'',p.municipio||'']);
  const csv=[h,...rows].map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='proyectos_pmo.csv';a.click();
}

function switchPFTab(i){

async function saveProyecto(id=''){
  const nombre=v('pf-nombre');if(!nombre.trim())return toast('El nombre es obligatorio.',true);
  const payload={
    codigo:v('pf-codigo'),nombre,pm_id:v('pf-pm_id')||null,lider_id:v('pf-lider_id')||null,
    sponsor_id:v('pf-sponsor_id')||null,portafolio_id:v('pf-portafolio_id')||null,programa_id:v('pf-programa_id')||null,
    estado_general:v('pf-estado_general'),estado_proyecto:v('pf-estado_proyecto'),
    tipo_proyecto:v('pf-tipo_proyecto'),tipificacion_proyecto:v('pf-tipificacion'),
    naturaleza:v('pf-naturaleza'),complejidad:v('pf-complejidad'),unidad_negocio:v('pf-unidad_negocio'),fondos:v('pf-fondos'),
    fecha_ingreso:v('pf-fecha_ingreso')||null,fecha_inicio_planificada:v('pf-fi_plan')||null,fecha_fin_planificada:v('pf-ff_plan')||null,
    fecha_inicio_real:v('pf-fi_real')||null,fecha_fin_real:v('pf-ff_real')||null,fecha_puesta_marcha:v('pf-f_puesta')||null,
    inversion_usd:numv('pf-inv_usd')||0,inversion_hnl:numv('pf-inv_hnl')||0,ejecutado_hnl:numv('pf-ejec_hnl')||0,
    nro_beneficiados:numv('pf-benef')||null,pct_avance_proyecto:numv('pf-pct_proy')||0,
    pct_ejecucion_obra:numv('pf-pct_obra')||0,pct_avance_financiero:numv('pf-pct_fin')||0,
    link_foto_principal:v('pf-foto_main'),departamento:v('pf-departamento'),municipio:v('pf-municipio'),
    zona_enee:v('pf-zona_enee'),sector_utcd:v('pf-sector_utcd'),
    lat:numv('pf-lat')||null,lon:numv('pf-lon')||null,direccion:v('pf-direccion'),
    descripcion:v('pf-descripcion'),alcance:v('pf-alcance'),objetivo:v('pf-objetivo'),beneficios:v('pf-beneficios'),
    updated_at:new Date().toISOString()
  };
  let error;
  if(id){({error}=await sb.from('proyectos').update(payload).eq('id',id));}
  else{({error}=await sb.from('proyectos').insert(payload));}
  if(error)return toast('Error: '+error.message,true);
  closeM('modal-proyecto');toast(id?'Proyecto actualizado.':'Proyecto creado.');
  if(id)nav('proyecto_detalle',{projectId:id});else nav('proyectos');
}

async function renderProyectoDetalle(){
  const id=app.projectId;
  const[{data:p},{data:updates},{data:adqLinks},{data:riesgos},{data:interesados},{data:permisos},{data:fotos},{data:visitas}]=await Promise.all([
    sb.from('proyectos').select('*,profiles!proyectos_pm_id_fkey(full_name),portafolios(nombre),programas(nombre)').eq('id',id).single(),
    sb.from('actualizaciones').select('*,profiles(full_name)').eq('proyecto_id',id).order('fecha',{ascending:false}),
    sb.from('proyecto_adquisicion').select('adquisicion_id,adquisiciones(*)').eq('proyecto_id',id),
    sb.from('riesgos_proyecto').select('*').eq('proyecto_id',id).order('created_at'),
    sb.from('interesados_proyecto').select('*').eq('proyecto_id',id),
    sb.from('permisos_proyecto').select('*').eq('proyecto_id',id).order('tipo_permiso'),
    sb.from('registro_fotografico').select('*').eq('proyecto_id',id).order('fecha',{ascending:false}),

  window._projDetail={p,updates:updates||[],adqLinks:adqLinks||[],riesgos:riesgos||[],interesados:interesados||[],permisos:permisos||[],fotos:fotos||[],visitas:visitas||[]};

  const pctP=p.pct_avance_proyecto||0,pctO=p.pct_ejecucion_obra||0,pctF=p.pct_avance_financiero||0;
  const circleGauge=(pct,color)=>`<div style="position:relative;width:64px;height:64px;margin:0 auto">
    <svg viewBox="0 0 36 36" style="width:64px;height:64px;transform:rotate(-90deg)">
      <circle cx="18" cy="18" r="15.9" fill="none" stroke="var(--border)" stroke-width="3"/>
      <circle cx="18" cy="18" r="15.9" fill="none" stroke="${color}" stroke-width="3" stroke-dasharray="${pct} ${100-pct}" stroke-linecap="round"/>
    </svg>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:${color}">${pct}%</div>
  </div>`;

  document.getElementById('topbar-actions').innerHTML=`
    <button class="btn-ghost" onclick="nav('proyectos')">← Proyectos</button>
    ${canEdit(p)?`<button class="btn-primary" onclick="openProyectoForm('${id}')">✏️ Editar</button>`:''}`;

  const tabs=['General','Actualizaciones','Adquisiciones','EVM','Ficha Técnica','Riesgos','Interesados','Permisología','Fotografías','Visitas'];
  document.getElementById('main-content').innerHTML=`
    <div class="detail-header">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;flex-wrap:wrap">
        <div style="flex:1">
          <div style="font-size:11px;color:var(--muted);margin-bottom:4px">${esc(p.codigo||'')}</div>
          <h1>${esc(p.nombre)}</h1>
          <div class="detail-meta" style="margin-top:8px">
            <span class="badge ${(p.estado_general||'').toLowerCase().replace(/\s/g,'')}">${p.estado_general||''}</span>
            <span class="meta-chip">📍 ${esc(p.departamento||'')}${p.municipio?', '+esc(p.municipio):''}</span>
            <span class="meta-chip">👤 ${esc(p.profiles?.full_name||'Sin PM')}</span>
            <span class="meta-chip">📁 ${esc(p.portafolios?.nombre||'—')}</span>
            ${p.tipo_proyecto?`<span class="meta-chip">🏷️ ${esc(p.tipo_proyecto)}</span>`:''}
            ${p.tipificacion_proyecto?`<span class="meta-chip">📌 ${esc(p.tipificacion_proyecto)}</span>`:''}
          </div>
        </div>
        <div style="display:flex;gap:2rem;flex-shrink:0;text-align:center">
          <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">% Proyecto</div>${circleGauge(pctP,'var(--bd)')}</div>
          <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">% Obra</div>${circleGauge(pctO,pctO>=80?'#639922':pctO>=40?'var(--p)':'#BA7517')}</div>
          <div><div style="font-size:11px;color:var(--muted);margin-bottom:4px">% Financiero</div>${circleGauge(pctF,'var(--tld)')}</div>
        </div>
      </div>

    <div class="tabs" id="proj-tabs">${tabs.map((t,i)=>`<button class="tab-btn ${i===0?'active':''}" onclick="switchProjTab(${i})">${t}</button>`).join('')}</div>

}

function switchProjTab(i){
  app.tab=i;
  document.querySelectorAll('#proj-tabs .tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  const{p,updates,adqLinks,riesgos,interesados,permisos,fotos,visitas}=window._projDetail||{};
  const id=p?.id;const tc=document.getElementById('proj-tab-content');
  if(i===0){tc.innerHTML=renderProjGeneral(p);}
  else if(i===1){renderUpdatesTab(updates,id,p);}
  else if(i===2){tc.innerHTML=renderProjAdqs(adqLinks,id,p);}
  else if(i===3){tc.innerHTML=`<div class="section-head"><h2>EVM — Curva S</h2>${canEdit(p)?`<button class="btn-ghost" onclick="openEVM('${id}')">⚙ Gestionar datos</button>`:''}</div><div class="card"><canvas id="evm-canvas" height="120"></canvas></div>`;setTimeout(()=>renderEVMChart(id),100);}
  else if(i===4){tc.innerHTML=`<div class="section-head"><h2>Ficha técnica</h2><div style="display:flex;gap:8px"><button class="btn-ghost" onclick="exportFichaPDF('${id}')">⬇ PDF</button>${canEdit(p)?`<button class="btn-primary" onclick="openFicha('${id}','${p.naturaleza||''}')">✏️ Editar ficha</button>`:''}</div></div><div id="ficha-content"></div>`;loadFichaContent(id,p.naturaleza||'');}
  else if(i===5){renderRiesgosTab(riesgos,id,p);}
  else if(i===6){renderInteresadosTab(interesados,id,p);}
  else if(i===7){renderPermisosTab(permisos,id,p);}
  else if(i===8){renderFotosTab(fotos,id,p);}
  else if(i===9){tc.innerHTML=`<div class="section-head"><h2>Visitas técnicas</h2><button class="btn-primary" onclick="openVisitaForm(null,'${id}')">+ Agregar visita</button></div>${renderVisitasTable(visitas)}`;}
}

    <div>
      <div class="card" style="margin-bottom:1rem"><div class="card-title">Información general</div>

        ${row('Ingreso',fmtDate(p.fecha_ingreso))}${row('Inicio plan.',fmtDate(p.fecha_inicio_planificada))}
        ${row('Fin plan.',fmtDate(p.fecha_fin_planificada))}${row('Inicio real',fmtDate(p.fecha_inicio_real))}
        ${row('Fin real',fmtDate(p.fecha_fin_real))}${row('Puesta en marcha',fmtDate(p.fecha_puesta_marcha))}
      </div>
    </div>
    <div>
      <div class="card" style="margin-bottom:1rem"><div class="card-title">Avances</div>
        ${pBar('Avance proyecto',p.pct_avance_proyecto||0,'var(--bd)')}
        ${pBar('Ejecución obra',p.pct_ejecucion_obra||0,(p.pct_ejecucion_obra||0)>=80?'#639922':(p.pct_ejecucion_obra||0)>=40?'var(--p)':'#BA7517')}
        ${pBar('Avance financiero',p.pct_avance_financiero||0,'var(--tld)')}

  const tc=document.getElementById('proj-tab-content');
  tc.innerHTML=`<div class="section-head"><h2>Registro de riesgos</h2>${canEdit(p)?`<button class="btn-primary" onclick="openRiesgoForm(null,'${proyId}')">+ Agregar riesgo</button>`:''}</div>
    <div style="display:grid;grid-template-columns:1fr 340px;gap:1.5rem">
      <div>
        ${riesgos.length?`<div class="table-wrap"><table>
          <thead><tr><th>#</th><th>Riesgo</th><th>Tipo</th><th>P</th><th>I</th><th>Nivel</th><th>Estado</th><th>VE($)</th><th></th></tr></thead>
          <tbody>${riesgos.map(r=>{
            const nivel=r.nivel||0;
            const col=nivel>=20?'var(--rd)':nivel>=10?'#BA7517':nivel>=5?'#855f00':'var(--gd)';
            return`<tr>
              <td style="font-size:11px;color:var(--muted)">${esc(r.consecutivo||'—')}</td>
              <td style="font-size:12px;max-width:200px">${esc((r.riesgo||'').substring(0,50))}</td>
              <td style="font-size:12px">${esc(r.tipo_riesgo||'—')}</td>
              <td style="text-align:center">${r.probabilidad||'—'}</td>
              <td style="text-align:center">${r.impacto||'—'}</td>
              <td style="text-align:center"><strong style="color:${col}">${nivel}</strong></td>
              <td><span class="badge ${(r.estado||'').toLowerCase().replace(/\s/g,'')}">${esc(r.estado||'—')}</span></td>
              <td style="text-align:right;font-size:12px">$${fmtNum(r.valor_esperado||0)}</td>
              <td class="action-row">${canEdit(p)?`<button class="icon-btn" onclick="openRiesgoForm('${r.id}','${proyId}')">✏️</button>${isCoord()?`<button class="icon-btn del" onclick="delRiesgo('${r.id}','${proyId}')">🗑</button>`:''}`:''}</td>
            </tr>`;
          }).join('')}</tbody>
        </table></div>`:`<div class="empty">Sin riesgos registrados.</div>`}
      </div>
      <div class="card"><div class="card-title">Matriz de riesgos</div>${renderRiskMatrix(riesgos)}</div>
    </div>`;
}

function renderRiskMatrix(riesgos){
  const getColor=n=>n>=20?'#A32D2D':n>=15?'#e06060':n>=10?'#FAEEDA':n>=5?'#d4c78a':'#EAF3DE';
  const getTC=n=>n>=15?'#fff':n>=10?'#854F0B':n>=5?'#4a3600':'#3B6D11';
  let h=`<div style="font-size:10px;color:var(--muted);margin-bottom:6px">← Probabilidad (fila) | Impacto (col) →</div>
    <div style="display:grid;grid-template-columns:20px repeat(5,1fr);gap:2px">
    <div></div>${[1,2,3,4,5].map(i=>`<div style="text-align:center;font-size:10px;color:var(--muted);padding:2px">${i}</div>`).join('')}`;
  for(let prob=5;prob>=1;prob--){
    h+=`<div style="font-size:10px;color:var(--muted);display:flex;align-items:center;justify-content:center">${prob}</div>`;
    for(let imp=1;imp<=5;imp++){
      const nivel=prob*imp;
      const pts=riesgos.filter(r=>r.probabilidad===prob&&r.impacto===imp);
      h+=`<div style="background:${getColor(nivel)};color:${getTC(nivel)};padding:5px 2px;border-radius:3px;text-align:center;font-size:11px;font-weight:600;min-height:30px;position:relative">${nivel}${pts.length?`<span style="position:absolute;top:1px;right:2px;background:rgba(0,0,0,.25);border-radius:50%;width:13px;height:13px;font-size:9px;display:flex;align-items:center;justify-content:center">${pts.length}</span>`:''}</div>`;
    }
  }
  h+=`</div><div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
    <span style="font-size:10px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#EAF3DE;border-radius:2px;display:inline-block"></span>Bajo</span>
    <span style="font-size:10px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#FAEEDA;border-radius:2px;display:inline-block"></span>Medio</span>
    <span style="font-size:10px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#FCEBEB;border-radius:2px;display:inline-block"></span>Alto</span>
    <span style="font-size:10px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#A32D2D;border-radius:2px;display:inline-block"></span>Crítico</span>
  </div>`;
  return h;
}

async function openRiesgoForm(id=null,proyId){
  let r={proyecto_id:proyId};
  if(id){const{data}=await sb.from('riesgos_proyecto').select('*').eq('id',id).single();r=data||r;}
  let nextNum='R-001';
  if(!id){const{data}=await sb.from('riesgos_proyecto').select('consecutivo').eq('proyecto_id',proyId).order('created_at',{ascending:false}).limit(1);nextNum='R-'+String(((parseInt((data?.[0]?.consecutivo||'R-000').replace('R-',''))||0)+1)).padStart(3,'0');}
  document.getElementById('modal-riesgo-body').innerHTML=`
    <h2>${id?'Editar riesgo':'Nuevo riesgo'}</h2>
    <div class="form-grid">
      <div class="field"><label>Consecutivo</label>${inp('rf-cons',r.consecutivo||nextNum)}</div>
      <div class="field"><label>Tipo de riesgo</label>${selDyn('rf-tipo',r.tipo_riesgo,'tipo_riesgo')}</div>
      <div class="field full"><label>Descripción del riesgo *</label><textarea id="rf-riesgo">${esc(r.riesgo||'')}</textarea></div>
      <div class="field"><label>Probabilidad (1-5)</label><select id="rf-prob">${[1,2,3,4,5].map(n=>`<option ${n==r.probabilidad?'selected':''}>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Impacto (1-5)</label><select id="rf-imp">${[1,2,3,4,5].map(n=>`<option ${n==r.impacto?'selected':''}>${n}</option>`).join('')}</select></div>
      <div class="field"><label>Costo estimado (USD)</label><input type="number" id="rf-costo" value="${r.costo_estimado||0}"></div>
      <div class="field"><label>Estado</label>${selDyn('rf-estado',r.estado||'Identificado','estado_riesgo')}</div>
      <div class="field"><label>Responsable</label>${inp('rf-resp',r.responsable)}</div>
      <div class="field"><label>Fecha revisión</label><input type="date" id="rf-fecha" value="${r.fecha_revision||''}"></div>
      <div class="field full"><label>Mitigación</label><textarea id="rf-mitigacion">${esc(r.mitigacion||'')}</textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="closeM('modal-riesgo')">Cancelar</button>
      <button class="btn-primary" onclick="saveRiesgo('${id||''}','${proyId}')">Guardar</button>
    </div>`;
  openM('modal-riesgo');
}

async function saveRiesgo(id,proyId){
  const payload={proyecto_id:proyId,consecutivo:v('rf-cons'),riesgo:v('rf-riesgo'),tipo_riesgo:v('rf-tipo'),
    probabilidad:parseInt(v('rf-prob')),impacto:parseInt(v('rf-imp')),costo_estimado:numv('rf-costo')||0,
    estado:v('rf-estado'),responsable:v('rf-resp'),fecha_revision:v('rf-fecha')||null,mitigacion:v('rf-mitigacion'),updated_at:new Date().toISOString()};
  const{error}=id?await sb.from('riesgos_proyecto').update(payload).eq('id',id):await sb.from('riesgos_proyecto').insert(payload);
  if(error)return toast('Error: '+error.message,true);
  closeM('modal-riesgo');toast('Riesgo guardado.');nav('proyecto_detalle',{projectId:proyId});
}
async function delRiesgo(id,proyId){
  if(!confirm('¿Eliminar?'))return;
  await sb.from('riesgos_proyecto').delete().eq('id',id);
  toast('Eliminado.');nav('proyecto_detalle',{projectId:proyId});
}

// ═══════════════════════════ PERMISOLOGÍA ═══════════════════════════
function renderPermisosTab(permisos,proyId,p){
  const tc=document.getElementById('proj-tab-content');
  const aprobados=permisos.filter(pe=>pe.estado==='Aprobado').length;
  const pendientes=permisos.filter(pe=>['Pendiente','En Trámite'].includes(pe.estado)).length;
  const alertas=permisos.filter(pe=>{
    if(!pe.fecha_vencimiento||pe.estado!=='Aprobado')return false;
    return Math.ceil((new Date(pe.fecha_vencimiento)-new Date())/(1000*60*60*24))<=(pe.alerta_dias||30);
  });
  tc.innerHTML=`<div class="section-head"><h2>Permisología</h2>${canEdit(p)?`<button class="btn-primary" onclick="openPermisoForm(null,'${proyId}')">+ Agregar permiso</button>`:''}</div>
    <div class="metric-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:1rem">
      <div class="metric-card"><div class="lbl">Total</div><div class="val">${permisos.length}</div></div>
      <div class="metric-card"><div class="lbl">Aprobados</div><div class="val" style="color:var(--gd)">${aprobados}</div></div>
      <div class="metric-card"><div class="lbl">Pendientes</div><div class="val" style="color:${pendientes?'var(--ad)':'var(--gd)'}">${pendientes}</div></div>
    </div>
    ${alertas.length?`<div class="alert warn">⚠️ <strong>${alertas.length} permiso(s)</strong> próximos a vencer: ${alertas.map(a=>esc(a.nombre_permiso)).join(', ')}</div>`:''} 
    ${permisos.length?`<div class="table-wrap"><table>
      <thead><tr><th>Permiso</th><th>Tipo</th><th>Entidad</th><th>Estado</th><th>N° Permiso</th><th>Aprobación</th><th>Vencimiento</th><th></th></tr></thead>
      <tbody>${permisos.map(pe=>{
        const dias=pe.fecha_vencimiento?Math.ceil((new Date(pe.fecha_vencimiento)-new Date())/(1000*60*60*24)):null;
        const vencAlt=dias!==null&&dias<=30&&pe.estado==='Aprobado';
        const dotClass=(pe.estado||'').toLowerCase().replace(/\s/g,'').replace('é','e').replace('á','a').replace('ó','o');
        return`<tr>
          <td><strong>${esc(pe.nombre_permiso)}</strong></td>
          <td style="font-size:12px">${esc(pe.tipo_permiso||'—')}</td>
          <td style="font-size:12px">${esc(pe.entidad||'—')}</td>
          <td><span style="display:flex;align-items:center"><span class="perm-dot ${dotClass}"></span><span class="badge ${dotClass}">${esc(pe.estado||'—')}</span></span></td>
          <td style="font-size:12px">${esc(pe.numero_permiso||'—')}</td>
          <td style="font-size:12px">${fmtDate(pe.fecha_aprobacion)}</td>
          <td style="font-size:12px;color:${vencAlt?'var(--rd)':'inherit'}">${fmtDate(pe.fecha_vencimiento)}${vencAlt?` <span style="font-size:10px">(${dias}d)</span>`:''}</td>
          <td class="action-row">${canEdit(p)?`<button class="icon-btn" onclick="openPermisoForm('${pe.id}','${proyId}')">✏️</button>${isCoord()?`<button class="icon-btn del" onclick="delPermiso('${pe.id}','${proyId}')">🗑</button>`:''}`:''}</td>
        </tr>`;
      }).join('')}</tbody>
    </table></div>`:`<div class="empty">Sin permisos registrados.</div>`}`;
}

  </div>`;

    ${row('Cant. postes',f.cant_postes)}${row('Tipo estructura',f.tipo_estructura)}${row('Zona geográfica',f.zona_geografica)}
    ${row('Clientes beneficiados',f.clientes_beneficiados)}${row('Constructora',f.empresa_constructora)}${row('Observaciones',f.observaciones)}
  </div>`;
  if(nat==='GENERACION')return`<div class="card"><div class="card-title">Datos — Generación</div>
    ${row('Tipo',f.tipo_generacion)}${row('Capacidad (MW)',f.capacidad_mw)}${row('Cant. unidades',f.cantidad_unidades)}
    ${row('Marca',f.marca_equipos)}${row('Combustible',f.combustible)}${row('Punto interconexión',f.punto_interconexion)}
    ${row('Tensión (kV)',f.nivel_tension_kv)}${row('Factor planta',f.factor_planta)}${row('Constructora',f.empresa_constructora)}${row('Observaciones',f.observaciones)}
  </div>`;
  if(nat==='TRANSMISION')return`<div class="card"><div class="card-title">Datos — Transmisión</div>
    ${row('Tipo línea',f.tipo_linea)}${row('Tensión (kV)',f.nivel_tension_kv)}${row('Longitud (km)',f.longitud_km)}

  </div>`;
  return'<div class="empty">Sin ficha técnica.</div>';
}

async function saveFicha(proyId,nat,fichaId=''){
  const tables={SUBESTACION:'ficha_subestacion',REDES:'ficha_redes',GENERACION:'ficha_generacion',TRANSMISION:'ficha_transmision'};
  const tbl=tables[nat];
  let payload={proyecto_id:proyId,updated_at:new Date().toISOString(),observaciones:v('ff-obs')};
  if(nat==='SUBESTACION')Object.assign(payload,{tipo_subestacion:v('ff-tipo'),nivel_tension_alta:numv('ff-ta'),nivel_tension_baja:numv('ff-tb'),potencia_mva:numv('ff-mva'),cant_transformadores:numv('ff-ct'),marca_transformador:v('ff-marca'),tipo_barra:v('ff-barra'),cant_bahias:numv('ff-bahias'),sistema_proteccion:v('ff-prot'),sistema_control:v('ff-ctrl'),area_terreno_m2:numv('ff-area'),empresa_constructora:v('ff-const'),empresa_supervision:v('ff-sup'),norma_aplicable:v('ff-norma')});
  if(nat==='REDES')Object.assign(payload,{tipo_red:v('ff-tred'),nivel_tension:numv('ff-ntens'),longitud_km:numv('ff-long'),calibre_conductor:v('ff-cal'),cant_circuitos:numv('ff-circ'),circuitos_nombres:v('ff-cnom'),cant_postes:numv('ff-post'),tipo_estructura:v('ff-est'),zona_geografica:v('ff-zona'),clientes_beneficiados:numv('ff-clib'),empresa_constructora:v('ff-const')});
  if(nat==='GENERACION')Object.assign(payload,{tipo_generacion:v('ff-tgen'),capacidad_mw:numv('ff-mw'),cantidad_unidades:numv('ff-uni'),marca_equipos:v('ff-marca'),combustible:v('ff-comb'),punto_interconexion:v('ff-pint'),nivel_tension_kv:numv('ff-tkv'),factor_planta:numv('ff-fp'),empresa_constructora:v('ff-const')});
  if(nat==='TRANSMISION')Object.assign(payload,{tipo_linea:v('ff-tlin'),nivel_tension_kv:numv('ff-tkv'),longitud_km:numv('ff-long'),calibre_conductor:v('ff-cal'),cant_circuitos:numv('ff-circ'),tipo_estructura:v('ff-est'),subestacion_origen:v('ff-seo'),subestacion_destino:v('ff-sed'),empresa_constructora:v('ff-const')});
  let error;
  if(fichaId){({error}=await sb.from(tbl).update(payload).eq('id',fichaId));}
  else{({error}=await sb.from(tbl).insert(payload));}
  if(error)return toast('Error: '+error.message,true);
  closeM('modal-ficha');toast('Ficha guardada.');nav('proyecto_detalle',{projectId:proyId});
}

async function exportFichaPDF(proyId){
  toast('Generando PDF...');
  const{jsPDF}=window.jspdf;
  const[{data:p},{data:fotos}]=await Promise.all([
    sb.from('proyectos').select('*,portafolios(nombre),profiles!proyectos_pm_id_fkey(full_name)').eq('id',proyId).single(),
    sb.from('registro_fotografico').select('*').eq('proyecto_id',proyId).order('fecha',{ascending:false}).limit(1)
  ]);
  if(!p)return toast('Proyecto no encontrado.',true);
  const tables={SUBESTACION:'ficha_subestacion',REDES:'ficha_redes',GENERACION:'ficha_generacion',TRANSMISION:'ficha_transmision'};
  const tbl=tables[p.naturaleza];
  const{data:ficha}=tbl?await sb.from(tbl).select('*').eq('proyecto_id',proyId).single():{data:null};
  const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  const sysName=app.config.system_name||'PMO SGP';
  doc.setFillColor(127,119,221);doc.rect(0,0,210,20,'F');
  doc.setTextColor(255);doc.setFontSize(14);doc.text(sysName,15,13);
  doc.setFontSize(9);doc.text('FICHA TÉCNICA',195,13,{align:'right'});
  doc.setTextColor(30);
  doc.setFontSize(16);doc.setFont(undefined,'bold');doc.text((p.nombre||'').substring(0,60),15,32);
  doc.setFont(undefined,'normal');doc.setFontSize(10);doc.setTextColor(100);
  doc.text(`${p.codigo||''} | ${p.naturaleza||''} | ${p.estado_general||''}`,15,39);
  doc.line(15,43,195,43);
  let y=50;
  const addSec=(t)=>{if(y>260){doc.addPage();y=20;}doc.setFontSize(11);doc.setFont(undefined,'bold');doc.setTextColor(127,119,221);doc.text(t,15,y);y+=6;doc.setFont(undefined,'normal');doc.setTextColor(60);};
  const addRow=(l,val)=>{if(!val&&val!==0)return;if(y>270){doc.addPage();y=20;}doc.setFontSize(9);doc.setTextColor(120);doc.text(l+':',15,y);doc.setTextColor(40);doc.text(String(val).substring(0,80),70,y);y+=5;};
  addSec('Información General');
  addRow('Depto./Municipio',`${p.departamento||''}${p.municipio?', '+p.municipio:''}`);
  addRow('Zona ENEE',p.zona_enee);addRow('PM',p.profiles?.full_name);
  addRow('Portafolio',p.portafolios?.nombre);addRow('Inversión USD','$'+fmtNum(p.inversion_usd||0));
  addRow('Inicio plan.',fmtDate(p.fecha_inicio_planificada));addRow('Fin plan.',fmtDate(p.fecha_fin_planificada));
  addRow('% Avance proyecto',(p.pct_avance_proyecto||0)+'%');addRow('% Obra',(p.pct_ejecucion_obra||0)+'%');
  y+=4;
  if(ficha){addSec('Datos Técnicos');Object.entries(ficha).forEach(([k,v2])=>{if(['id','proyecto_id','created_at','updated_at'].includes(k))return;if(v2!==null&&v2!=='')addRow(k.replace(/_/g,' '),v2);});}
  if(p.descripcion){addSec('Descripción');const lines=doc.splitTextToSize(p.descripcion,175);doc.setFontSize(9);doc.setTextColor(60);lines.forEach(l=>{if(y>270){doc.addPage();y=20;}doc.text(l,15,y);y+=5;});}
  doc.setFontSize(8);doc.setTextColor(150);doc.text(`Generado: ${new Date().toLocaleString('es-HN')} | ${sysName}`,15,287);
  doc.save(`ficha_tecnica_${(p.codigo||p.id||'').replace(/[^a-z0-9]/gi,'_')}.pdf`);
}

      <div class="field"><label>Presupuesto</label><input type="number" id="af-pres" value="${a.presupuesto||0}"></div>
      <div class="field"><label>Moneda</label><select id="af-moneda"><option ${!a.moneda||a.moneda==='USD'?'selected':''}>USD</option><option ${a.moneda==='HNL'?'selected':''}>HNL</option></select></div>
      <div class="field"><label>SOLPED N°</label>${inp('af-solped',a.solped_numero)}</div>
      <div class="field"><label>Fecha SOLPED</label><input type="date" id="af-fsolped" value="${a.solped_fecha||''}"></div>
      <div class="field"><label>🔗 Link licitación (URL)</label><input type="url" id="af-link_proc" value="${esc(a.link_proceso||'')}" placeholder="https://..."></div>
      <div class="field"><label>N° contrato</label>${inp('af-cont_cons',a.contrato_consecutivo)}</div>
      <div class="field"><label>Empresa contratista</label>${inp('af-cont_emp',a.contrato_empresa)}</div>
      <div class="field"><label>Monto contrato</label><input type="number" id="af-cont_monto" value="${a.contrato_monto||''}"></div>
      <div class="field"><label>Fecha firma</label><input type="date" id="af-cont_ffirma" value="${a.contrato_fecha_firma||''}"></div>
      <div class="field"><label>Inicio contrato</label><input type="date" id="af-cont_fi" value="${a.contrato_fecha_inicio||''}"></div>
      <div class="field"><label>Fin contrato</label><input type="date" id="af-cont_ff" value="${a.contrato_fecha_fin||''}"></div>
      <div class="field"><label>📄 Link contrato (URL)</label><input type="url" id="af-link_cont" value="${esc(a.link_contrato||'')}" placeholder="https://..."></div>
      <div class="field full"><label>Proyectos vinculados</label>
        <select id="af-proy" multiple style="min-height:80px">${(projs||[]).map(p=>`<option value="${p.id}">${esc(p.nombre)}</option>`).join('')}</select>
        <div style="font-size:11px;color:var(--muted);margin-top:4px">Ctrl+clic para seleccionar múltiples</div>
      </div>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="closeM('modal-adq')">Cancelar</button>
      <button class="btn-primary" onclick="saveAdq('${id||''}','${proyId||''}')">Guardar</button>
    </div>`;
  if(proyId){const sel=document.getElementById('af-proy');if(sel)Array.from(sel.options).forEach(o=>{if(o.value===proyId)o.selected=true;});}
  openM('modal-adq');
}

async function saveAdq(id='',proyId=''){
  const nombre=v('af-nombre');if(!nombre.trim())return toast('El nombre es obligatorio.',true);
  const payload={nombre,descripcion:v('af-desc'),tipo:v('af-tipo')||'contrato',estado:v('af-estado'),fondo_entidad:v('af-fondo_e')||null,fondo_tipo:v('af-fondo_t')||null,moneda:v('af-moneda'),presupuesto:numv('af-pres')||0,solped_numero:v('af-solped'),solped_fecha:v('af-fsolped')||null,link_proceso:v('af-link_proc')||null,contrato_consecutivo:v('af-cont_cons'),contrato_empresa:v('af-cont_emp'),contrato_monto:numv('af-cont_monto')||null,contrato_fecha_firma:v('af-cont_ffirma')||null,contrato_fecha_inicio:v('af-cont_fi')||null,contrato_fecha_fin:v('af-cont_ff')||null,link_contrato:v('af-link_cont')||null,updated_at:new Date().toISOString()};
  let adqId=id,error;
  if(id){({error}=await sb.from('adquisiciones').update(payload).eq('id',id));}
  else{const{data:ins,error:err}=await sb.from('adquisiciones').insert(payload).select().single();error=err;adqId=ins?.id;}
  if(error)return toast('Error: '+error.message,true);
  if(adqId){const sel=document.getElementById('af-proy');const selected=sel?Array.from(sel.selectedOptions).map(o=>o.value).filter(Boolean):[];if(selected.length){await sb.from('proyecto_adquisicion').delete().eq('adquisicion_id',adqId);await sb.from('proyecto_adquisicion').insert(selected.map(pid=>({proyecto_id:pid,adquisicion_id:adqId})));}}
  closeM('modal-adq');toast('Adquisición guardada.');
  if(app.view==='adquisiciones')nav('adquisiciones');else nav('proyecto_detalle',{projectId:app.projectId});
}

// ═══════════════════════════ MAPA ═══════════════════════════
async function renderMapa(){
  const{data:projs}=await sb.from('proyectos').select('id,nombre,lat,lon,estado_general,departamento,municipio,pct_ejecucion_obra');
  document.getElementById('main-content').innerHTML=`<div id="mapa-full" style="height:calc(100vh - 52px - 3rem);border-radius:12px;overflow:hidden"></div>`;
  setTimeout(()=>{
    if(window._mapaFull){window._mapaFull.remove();window._mapaFull=null;}
    const m=L.map('mapa-full').setView([14.65,-86.8],7);window._mapaFull=m;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(m);
    (projs||[]).filter(p=>p.lat&&p.lon).forEach(p=>{
      const col={Abierto:'#639922','En Riesgo':'#A32D2D',Pausado:'#BA7517',Cerrado:'#6B6A64'}[p.estado_general]||'#7F77DD';
      L.circleMarker([p.lat,p.lon],{radius:9,fillColor:col,color:'#fff',weight:2,fillOpacity:.9}).addTo(m)
       .bindPopup(`<div style="min-width:160px"><strong>${p.nombre}</strong><br><span style="font-size:12px;color:#666">${p.departamento||''}${p.municipio?', '+p.municipio:''}</span><br>Obra: ${p.pct_ejecucion_obra||0}%<br><a href="#" onclick="closeM('');nav('proyecto_detalle',{projectId:'${p.id}'});return false" style="font-size:12px;color:#7F77DD">Ver detalle →</a></div>`);
    });
  },100);
}

// ═══════════════════════════ EQUIPO ═══════════════════════════
async function renderEquipo(){
  const{data:profs}=await sb.from('profiles').select('*,lider:profiles!profiles_lider_id_fkey(full_name)').order('full_name');
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('main-content').innerHTML=`
    <div class="table-wrap">
      <table>
        <thead><tr><th>Nombre</th><th>Email</th><th>Rol</th><th>Reporta a</th><th>Estado</th></tr></thead>
        <tbody>${(profs||[]).map(p=>`<tr>
          <td><div style="display:flex;align-items:center;gap:10px"><div class="user-av" style="width:28px;height:28px;font-size:11px">${(p.full_name||'?').charAt(0).toUpperCase()}</div><strong>${esc(p.full_name||'—')}</strong></div></td>
          <td style="font-size:12px">${esc(p.email||'—')}</td>
          <td><span class="badge ${p.role}">${{coordinador:'Coordinador',lider:'Líder',pm:'PM'}[p.role]||p.role}</span></td>
          <td style="font-size:12px">${esc(p.lider?.full_name||'—')}</td>
          <td><span class="badge ${p.activo!==false?'activo':'cerrado'}">${p.activo!==false?'Activo':'Inactivo'}</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>`;
}

// ═══════════════════════════ CONFIGURACIÓN ═══════════════════════════
async function renderConfiguracion(){
  if(!isCoord()){document.getElementById('main-content').innerHTML='<div class="empty">Acceso restringido a coordinadores.</div>';return;}
  const[{data:lists},{data:cfg}]=await Promise.all([
    sb.from('config_listas').select('*').order('categoria').order('orden'),
    sb.from('config_sistema').select('*')
  ]);
  const c={};(cfg||[]).forEach(r=>c[r.clave]=r.valor);
  const cats=[...new Set((lists||[]).map(l=>l.categoria))];
  window._cfgLists=lists||[];
  document.getElementById('main-content').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem">
      <div class="card" style="grid-column:1/-1">
        <div class="card-title">⚙️ Configuración del sistema</div>
        <div class="form-grid">
          <div class="field"><label>Nombre del sistema</label><input type="text" id="cfg-name" value="${esc(c.system_name||'PMO SGP')}"></div>
          <div class="field"><label>Subtítulo</label><input type="text" id="cfg-sub" value="${esc(c.system_sub||'UTCD — ENEE')}"></div>
          <div class="field"><label>URL del logo</label><input type="url" id="cfg-logo" value="${esc(c.logo_url||'')}" placeholder="https://..."></div>
          <div class="field"><label>Color primario <span id="color-prev" style="display:inline-block;width:24px;height:24px;border-radius:4px;background:${c.primary_color||'#7F77DD'};vertical-align:middle;margin-left:6px;border:0.5px solid var(--border)"></span></label>
            <input type="color" id="cfg-color" value="${c.primary_color||'#7F77DD'}" oninput="document.getElementById('color-prev').style.background=this.value">
          </div>
        </div>
        <div style="margin-top:1rem"><button class="btn-primary" onclick="saveConfig()">Guardar configuración del sistema</button></div>
      </div>
      <div class="card" style="grid-column:1/-1">
        <div class="card-title">📋 Listas desplegables</div>
        <div class="filter-bar" style="margin-bottom:1rem">
          <select id="lista-cat" onchange="renderListaItems()" style="min-width:200px"><option value="">— Seleccionar categoría —</option>${cats.map(ct=>`<option>${ct}</option>`).join('')}</select>
          <input type="text" id="nuevo-valor" placeholder="Nuevo valor a agregar..." style="flex:1;padding:8px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:13px">
          <button class="btn-primary" onclick="addListaValor()">+ Agregar</button>
        </div>
        <div id="lista-items"></div>
      </div>
    </div>`;
}

function renderListaItems(){
  const cat=v('lista-cat');
  const items=(window._cfgLists||[]).filter(l=>l.categoria===cat);
  document.getElementById('lista-items').innerHTML=items.length?`<div class="table-wrap"><table>
    <thead><tr><th>Valor</th><th>Orden</th><th>Activo</th><th></th></tr></thead>
    <tbody>${items.map(i=>`<tr>
      <td>${esc(i.valor)}</td><td style="color:var(--muted);font-size:12px">${i.orden}</td>
      <td><span class="badge ${i.activo?'activo':'cerrado'}">${i.activo?'Sí':'No'}</span></td>
      <td><button class="icon-btn del" onclick="delListaItem('${i.id}')">🗑</button></td>
    </tr>`).join('')}</tbody>
  </table></div>`:'<div class="empty">Sin valores en esta categoría.</div>';
}

async function addListaValor(){
  const cat=v('lista-cat');const valor=v('nuevo-valor').trim();
  if(!cat)return toast('Selecciona una categoría.',true);
  if(!valor)return toast('Escribe un valor.',true);
  const orden=(window._cfgLists||[]).filter(l=>l.categoria===cat).length+1;
  const{error}=await sb.from('config_listas').insert({categoria:cat,valor,orden});
  if(error)return toast('Error: '+error.message,true);
  toast('Valor agregado.');nav('configuracion');
}

async function delListaItem(id){
  if(!confirm('¿Eliminar este valor?'))return;
  await sb.from('config_listas').delete().eq('id',id);
  toast('Eliminado.');nav('configuracion');
}

async function saveConfig(){
  const updates=[{clave:'system_name',valor:v('cfg-name')},{clave:'system_sub',valor:v('cfg-sub')},{clave:'logo_url',valor:v('cfg-logo')},{clave:'primary_color',valor:document.getElementById('cfg-color').value}];
  for(const u of updates)await sb.from('config_sistema').upsert(u,{onConflict:'clave'});
  toast('Configuración guardada.');await loadConfig();
}

// ═══════════════════════════ DELETE CONFIRM ═══════════════════════════
function confirmDelete(tabla,id){
  if(!isCoord())return toast('Solo el coordinador puede eliminar.',true);
  document.getElementById('modal-confirm-body').innerHTML=`
    <h2>⚠️ Confirmar eliminación</h2>
    <p style="font-size:14px;color:var(--muted);margin-bottom:1.5rem">Esta acción es permanente e irreversible. ¿Continuar?</p>
    <div class="form-actions">
      <button class="btn-ghost" onclick="closeM('modal-confirm')">Cancelar</button>
      <button class="btn-danger" onclick="doDelete('${tabla}','${id}')">Eliminar definitivamente</button>
    </div>`;
  openM('modal-confirm');
}

async function doDelete(tabla,id){
  const{error}=await sb.from(tabla).delete().eq('id',id);
  if(error)return toast('Error: '+error.message,true);
  closeM('modal-confirm');toast('Eliminado correctamente.');
  if(app.view==='proyecto_detalle'&&tabla==='proyectos')nav('proyectos');
  else render();
}

// ═══════════════════════════ MINI MAP ═══════════════════════════
// Render mini map after page load if coordinates exist
const _origSwitchProjTab=switchProjTab;
function switchProjTab(i){
  _origSwitchProjTab(i);
  if(i===0){
    setTimeout(()=>{
      const{p}=window._projDetail||{};
      if(p?.lat&&p?.lon&&document.getElementById('mini-map-div')){
        if(window._miniMap){window._miniMap.remove();window._miniMap=null;}
        const m=L.map('mini-map-div').setView([p.lat,p.lon],13);window._miniMap=m;
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(m);
        L.circleMarker([p.lat,p.lon],{radius:10,fillColor:'#7F77DD',color:'#fff',weight:2,fillOpacity:.9}).addTo(m).bindPopup(p.nombre).openPopup();
      }
    },200);
  }
}
</script>
</body>
