<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PMO SGP</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--p:#7F77DD;--pl:#EEEDFE;--pd:#534AB7;--tl:#E1F5EE;--tld:#0F6E56;--al:#FAEEDA;--ad:#854F0B;--rl:#FCEBEB;--rd:#A32D2D;--gl:#EAF3DE;--gd:#3B6D11;--bl:#E6F1FB;--bd:#185FA5;--bg:#F7F6F2;--card:#fff;--border:#E8E6DF;--text:#1A1A18;--muted:#6B6A64;--hint:#9A9991;--sidebar:224px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
a{text-decoration:none;color:inherit}button{cursor:pointer;font-family:inherit}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}
.auth-card{background:var(--card);border:0.5px solid var(--border);border-radius:16px;padding:2rem;width:100%;max-width:380px}
.auth-logo{font-size:22px;font-weight:600;color:var(--p);margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:1.5rem}
.field{margin-bottom:1rem}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:8px;font-size:14px;outline:none;background:#fff;color:var(--text);font-family:inherit}
.field textarea{resize:vertical;min-height:72px}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--p);box-shadow:0 0 0 3px var(--pl)}
.btn-primary{padding:9px 18px;background:var(--p);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;transition:background .15s;white-space:nowrap}
.btn-primary:hover{background:var(--pd)}.btn-primary.full{width:100%;padding:10px}
.btn-ghost{background:transparent;border:0.5px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;color:var(--text);transition:background .15s}
.btn-ghost:hover{background:var(--bg)}
.btn-danger{background:var(--rd);color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px}
.btn-danger:hover{background:#7a1f1f}
.msg{font-size:13px;padding:8px 12px;border-radius:8px;margin-bottom:1rem}
.msg.err{background:var(--rl);color:var(--rd)}.msg.ok{background:var(--gl);color:var(--gd)}
.link-btn{background:none;border:none;color:var(--p);font-size:13px;cursor:pointer;padding:0;text-decoration:underline}
.auth-toggle{text-align:center;margin-top:1rem;font-size:13px;color:var(--muted)}
#app-screen{display:none;min-height:100vh}
.layout{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:var(--card);border-right:0.5px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:20;overflow-y:auto}
.sidebar-logo{padding:1.1rem 1rem .9rem;border-bottom:0.5px solid var(--border)}
.logo-txt .name{font-size:14px;font-weight:600;color:var(--text)}.logo-txt .sub{font-size:11px;color:var(--muted);margin-top:2px}
.nav-section{padding:.7rem .75rem .2rem;font-size:10px;font-weight:600;color:var(--hint);letter-spacing:.07em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 8px;border-radius:8px;font-size:13px;color:var(--muted);cursor:pointer;transition:all .15s;border:none;background:none;width:calc(100% - 16px);text-align:left}
.nav-item:hover{background:var(--bg);color:var(--text)}.nav-item.active{background:var(--pl);color:var(--pd);font-weight:500}
.nav-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0}
.sidebar-footer{margin-top:auto;padding:1rem;border-top:0.5px solid var(--border);flex-shrink:0}
.user-chip{display:flex;align-items:center;gap:9px}
.user-av{width:32px;height:32px;border-radius:50%;background:var(--pl);color:var(--pd);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.user-name{font-size:12px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--muted)}
.logout-btn{margin-left:auto;background:none;border:none;font-size:18px;color:var(--hint);cursor:pointer;padding:4px}
.logout-btn:hover{color:var(--rd)}
.main{margin-left:var(--sidebar);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--card);border-bottom:0.5px solid var(--border);padding:0 1.5rem;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar-title{font-size:15px;font-weight:500}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{padding:1.5rem;flex:1}
.metric-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:1.5rem}
.metric-card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:14px 16px}
.metric-card .lbl{font-size:11px;color:var(--muted);margin-bottom:6px}
.metric-card .val{font-size:26px;font-weight:500}
.metric-card .sub{font-size:11px;color:var(--hint);margin-top:3px}
.card{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem}
.card-title{font-size:14px;font-weight:500;margin-bottom:1rem}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;gap:8px;flex-wrap:wrap}
.section-head h2{font-size:15px;font-weight:500}
.table-wrap{overflow-x:auto;border-radius:12px;border:0.5px solid var(--border)}
table{width:100%;border-collapse:collapse;background:var(--card)}
th{padding:10px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--muted);border-bottom:0.5px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 14px;font-size:13px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.clickable{cursor:pointer}tr.clickable:hover td{background:var(--bg)}
.badge{display:inline-flex;align-items:center;font-size:11px;padding:3px 9px;border-radius:20px;white-space:nowrap;font-weight:500}
.badge.abierto,.badge.activo,.badge.normal,.badge.aprobado2{background:var(--pl);color:var(--pd)}
.badge.cerrado,.badge.finalizado,.badge.pagado,.badge.aprobado,.badge.mitigado{background:var(--gl);color:var(--gd)}
.badge.riesgo,.badge.pendiente,.badge.rechazado,.badge.vencido,.badge.materializado,.badge.enriesgo{background:var(--rl);color:var(--rd)}
.badge.pausado,.badge.proceso,.badge.en_proceso,.badge.entramite,.badge.enseguimiento,.badge.contrato,.badge.con_reporte{background:var(--al);color:var(--ad)}
.badge.fotografico,.badge.compra_directa,.badge.compra{background:var(--tl);color:var(--tld)}
.badge.identificado,.badge.pm{background:var(--bl);color:var(--bd)}
.badge.coordinador{background:var(--pl);color:var(--pd)}.badge.lider{background:var(--gl);color:var(--gd)}
.prog-wrap{display:flex;align-items:center;gap:8px}
.prog-bar{flex:1;height:5px;background:var(--border);border-radius:4px;overflow:hidden;min-width:60px}
.prog-fill{height:100%;border-radius:4px;background:var(--p);transition:width .3s}
.prog-fill.green{background:#639922}.prog-fill.amber{background:#BA7517}.prog-fill.red{background:var(--rd)}
.prog-pct{font-size:12px;color:var(--muted);min-width:34px;text-align:right}
.tabs{display:flex;gap:2px;border-bottom:0.5px solid var(--border);margin-bottom:1.5rem;overflow-x:auto}
.tab-btn{padding:9px 16px;font-size:13px;border:none;background:none;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-0.5px;transition:all .15s;white-space:nowrap}
.tab-btn.active{color:var(--p);border-bottom-color:var(--p);font-weight:500}
.tab-btn:hover:not(.active){color:var(--text)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-grid .full{grid-column:1/-1}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:0.5px solid var(--border)}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:200;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal-wrap.open{display:flex}
.modal{background:var(--card);border-radius:16px;width:100%;max-width:560px;padding:1.5rem;position:relative;margin:auto}
.modal-xl{max-width:960px}.modal-lg{max-width:760px}
.modal h2{font-size:17px;font-weight:500;margin-bottom:1.25rem}
.filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:7px 10px;border:0.5px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text);outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:var(--p)}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px}
.alert.warn{background:var(--al);color:var(--ad)}.alert.info{background:var(--bl);color:var(--bd)}.alert.danger{background:var(--rl);color:var(--rd)}.alert.ok{background:var(--gl);color:var(--gd)}
.detail-header{background:var(--card);border:0.5px solid var(--border);border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1.5rem}
.detail-header h1{font-size:18px;font-weight:500;margin-bottom:8px}
.detail-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.meta-chip{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted);font-size:14px;border:0.5px dashed var(--border);border-radius:12px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#2C2C2A;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;opacity:0;transition:opacity .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--p);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-state{display:flex;align-items:center;justify-content:center;padding:3rem;color:var(--muted);gap:10px;font-size:14px}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;padding:0;margin-bottom:1rem}
.back-btn:hover{color:var(--text)}
.action-row{display:flex;gap:4px}
.icon-btn{background:none;border:0.5px solid transparent;border-radius:6px;padding:4px 8px;font-size:12px;color:var(--hint);cursor:pointer;transition:all .15s}
.icon-btn:hover{background:var(--bg);border-color:var(--border);color:var(--text)}
.icon-btn.del:hover{background:var(--rl);color:var(--rd)}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}
.photo-card{border-radius:10px;overflow:hidden;border:0.5px solid var(--border);background:var(--card)}
.photo-card img{width:100%;height:140px;object-fit:cover;display:block}
.photo-card .photo-info{padding:10px}
.perm-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;margin-right:4px}
.perm-dot.aprobado{background:var(--gd)}.perm-dot.pendiente,.perm-dot.notramite{background:var(--hint)}
.perm-dot.entramite{background:var(--ad)}.perm-dot.rechazado,.perm-dot.vencido{background:var(--rd)}
@media(max-width:768px){.sidebar{transform:translateX(-100%)}.main{margin-left:0}.metric-grid{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<script>
// ═══════════════════════════ CONFIG & STATE ═══════════════════════════
const SURL='https://sucbihsncxcaytwixbfh.supabase.co';
const SKEY='sb_publishable_xa1LYBqA7oRmLIvea7n1qQ_XjY-wWg9';
const sb=supabase.createClient(SURL,SKEY);
const app={user:null,profile:null,teamPmIds:[],view:'dashboard',projectId:null,adqId:null,tab:0,lists:{},config:{}};

const v=id=>(document.getElementById(id)||{}).value||'';
const numv=id=>{const n=parseFloat(v(id));return isNaN(n)?null:n;};
const esc=s=>String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtNum=n=>Number(n||0).toLocaleString('en-US',{minimumFractionDigits:0,maximumFractionDigits:0});
const fmtDate=d=>d?new Date(d+'T00:00:00').toLocaleDateString('es-HN',{day:'2-digit',month:'short',year:'2-digit'}):'—';
const inp=(id,val,type='text',ph='')=>`<input type="${type}" id="${id}" value="${esc(val||'')}" placeholder="${ph}">`;

function toast(msg,err=false){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.background=err?'var(--rd)':'#2C2C2A';
  el.classList.add('show');setTimeout(()=>el.classList.remove('show'),3200);
}
function openM(id){document.getElementById(id).classList.add('open');}
function closeM(id){document.getElementById(id).classList.remove('open');}

async function loadLists(){
  const{data}=await sb.from('config_listas').select('*').eq('activo',true).order('orden');
  app.lists={};
  (data||[]).forEach(r=>{if(!app.lists[r.categoria])app.lists[r.categoria]=[];app.lists[r.categoria].push(r.valor);});
}

async function loadConfig(){
  const{data}=await sb.from('config_sistema').select('*');
  app.config={};(data||[]).forEach(r=>app.config[r.clave]=r.valor);
  if(app.config.primary_color){

    document.documentElement.style.setProperty('--pl',shadeColor(app.config.primary_color,80));
  }

    document.getElementById('auth-logo-txt').style.display='none';

function shadeColor(hex,pct){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  if(pct>0){r=Math.min(255,Math.round(r+(255-r)*pct/100));g=Math.min(255,Math.round(g+(255-g)*pct/100));b=Math.min(255,Math.round(b+(255-b)*pct/100));}
  else{r=Math.max(0,Math.round(r*(1+pct/100)));g=Math.max(0,Math.round(g*(1+pct/100)));b=Math.max(0,Math.round(b*(1+pct/100)));}
  return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
}

function selDyn(id,val,cat,ph='— Seleccionar —'){

}

};

function showMode(m){
  ['login','reg','reset'].forEach(x=>document.getElementById('m-'+x).style.display=x===m?'':'none');
  const t={login:'Ingresa a tu cuenta',reg:'Crea tu cuenta',reset:'Recuperar contraseña'};
  document.getElementById('auth-sub-txt').textContent=t[m]||'';
  document.getElementById('auth-msg').innerHTML='';
}
function authMsg(txt,type='err'){document.getElementById('auth-msg').innerHTML=`<div class="msg ${type}">${txt}</div>`;}
async function doLogin(){
  const email=v('l-email'),pass=v('l-pass');
  if(!email||!pass)return authMsg('Completa todos los campos.');
  const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
  if(error)return authMsg('Correo o contraseña incorrectos.');
  app.user=data.user;await loadProfile();showApp();
}
async function doRegister(){
  const name=v('r-name'),email=v('r-email'),pass=v('r-pass');
  if(!name||!email||!pass)return authMsg('Completa todos los campos.');
  if(pass.length<6)return authMsg('Contraseña mínimo 6 caracteres.');
  const{error}=await sb.auth.signUp({email,password:pass,options:{data:{full_name:name}}});
  if(error)return authMsg('Error: '+error.message);
  authMsg('¡Cuenta creada! Ya puedes ingresar.','ok');setTimeout(()=>showMode('login'),1800);
}
async function doReset(){
  const email=v('rst-email');if(!email)return authMsg('Ingresa tu correo.');
  const{error}=await sb.auth.resetPasswordForEmail(email);
  if(error)return authMsg('Error: '+error.message);
  authMsg('✅ Correo enviado.','ok');
}
async function doLogout(){await sb.auth.signOut();location.reload();}
async function loadProfile(){
  const{data}=await sb.from('profiles').select('*').eq('id',app.user.id).single();
  app.profile=data||{role:'pm'};
  app.teamPmIds=[];
if(app.profile?.role==='lider'){
  const{data:team}=await sb.from('profiles').select('id').eq('lider_id',app.profile.id).eq('activo',true);
  app.teamPmIds=(team||[]).map(x=>x.id);
}
  document.getElementById('sidebar-av').textContent=(app.profile.full_name||'?').charAt(0).toUpperCase();

  document.getElementById('sidebar-role').textContent={coordinador:'Coordinador',lider:'Líder',pm:'PM'}[app.profile.role]||app.profile.role;

function showApp(){

document.addEventListener('keydown',e=>{

function applyDashFilters(){

  const ps=(window._dashProjs||[]).filter(p=>

    (!pm||p.pm_id===pm)&&(!estado||p.estado_general===estado)&&
    (!tipo||p.tipo_proyecto===tipo)&&(!zona||p.zona_enee===zona));
  const us=window._dashUpdates||[];
  const abiertos=ps.filter(p=>p.estado_general==='Abierto').length;
  const riesgo=ps.filter(p=>p.estado_general==='En Riesgo').length;
  const cerrados=ps.filter(p=>p.estado_general==='Cerrado').length;
  const totalInv=ps.reduce((s,p)=>s+(p.inversion_usd||0),0);
  const sevenAgo=new Date();sevenAgo.setDate(sevenAgo.getDate()-7);
  const recentIds=new Set(us.filter(u=>new Date(u.fecha)>=sevenAgo).map(u=>u.proyecto_id));
  const stale=ps.filter(p=>p.estado_general==='Abierto'&&!recentIds.has(p.id));
  const avgAvance=ps.length?Math.round(ps.reduce((s,p)=>s+(p.pct_ejecucion_obra||0),0)/ps.length):0;
  const g={};ps.forEach(p=>{const k=p.estado_general||'Sin estado';g[k]=(g[k]||0)+1;});
  const gt={};ps.forEach(p=>{const k=p.tipo_proyecto||'Sin tipo';gt[k]=(gt[k]||0)+1;});

  document.getElementById('dash-body').innerHTML=`
    <div class="metric-grid">
      <div class="metric-card"><div class="lbl">Proyectos activos</div><div class="val" style="color:var(--p)">${abiertos}</div><div class="sub">${riesgo} en riesgo · ${cerrados} cerrados</div></div>
      <div class="metric-card"><div class="lbl">Inversión total (USD)</div><div class="val">$${fmtNum(totalInv)}</div><div class="sub">${ps.length} proyectos</div></div>
      <div class="metric-card"><div class="lbl">Sin actualizar +7 días</div><div class="val" style="color:${stale.length?'var(--rd)':'var(--gd)'}">${stale.length}</div><div class="sub">de ${abiertos} abiertos</div></div>
      <div class="metric-card"><div class="lbl">Avance promedio obra</div><div class="val">${avgAvance}<span style="font-size:16px">%</span></div><div class="sub">ejecución física</div></div>
    </div>
    ${stale.length?`<div class="card" style="margin-bottom:1.5rem"><div class="card-title" style="color:var(--rd)">⚠️ Proyectos sin actualizar esta semana</div>${stale.slice(0,5).map(p=>`<div class="alert warn" style="cursor:pointer;margin-bottom:6px" onclick="nav('proyecto_detalle',{projectId:'${p.id}'})"><span>📁</span><div><strong>${esc(p.nombre)}</strong><div style="font-size:11px;margin-top:2px">${esc(p.profiles?.full_name||'Sin PM')} · ${esc(p.estado_proyecto||'')}</div></div></div>`).join('')}${stale.length>5?`<div style="font-size:12px;color:var(--muted);margin-top:4px">...y ${stale.length-5} más</div>`:''}</div>`:''}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.5rem;margin-bottom:1.5rem">
      <div class="card"><div class="card-title">Estado de proyectos</div>${Object.entries(g).map(([k,n])=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border)"><span class="badge ${k.toLowerCase().replace(/\s/g,'')}">${k}</span><strong>${n}</strong></div>`).join('')||'<div class="empty" style="border:none">Sin datos</div>'}</div>
      <div class="card"><div class="card-title">Por tipo</div>${Object.entries(gt).map(([k,n])=>`<div style="display:flex;justify-content:space-between;padding:7px 0;border-bottom:0.5px solid var(--border)"><span>${k}</span><strong>${n}</strong></div>`).join('')||'<div class="empty" style="border:none">Sin datos</div>'}</div>
    </div>
    <div class="card" style="margin-bottom:1.5rem"><div class="card-title">Avance por tipo</div>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:1rem">
        ${[...new Set(ps.map(p=>p.tipo_proyecto||'Sin tipo'))].map(k=>{const arr=ps.filter(p=>(p.tipo_proyecto||'Sin tipo')===k);const avg=Math.round(arr.reduce((s,p)=>s+(p.pct_ejecucion_obra||0),0)/arr.length);return`<div style="padding:10px;background:var(--bg);border-radius:8px"><div style="font-size:12px;color:var(--muted);margin-bottom:4px">${k}</div><div style="font-size:11px;color:var(--hint);margin-bottom:6px">${arr.length} proyecto${arr.length!==1?'s':''}</div><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill ${avg>=80?'green':avg>=40?'':'amber'}" style="width:${avg}%"></div></div><span class="prog-pct">${avg}%</span></div></div>`;}).join('')}
      </div>
    </div>
    <div class="card"><div class="card-title">Mapa de proyectos filtrados</div><div id="dash-map" style="height:360px;border-radius:8px;overflow:hidden"></div></div>`;
  setTimeout(()=>{
    if(window._dashMap){window._dashMap.remove();window._dashMap=null;}
    const m=L.map('dash-map').setView([14.65,-86.8],7);window._dashMap=m;
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(m);
    ps.filter(p=>p.lat&&p.lon).forEach(p=>{
      const col={Abierto:'#639922','En Riesgo':'#A32D2D',Pausado:'#BA7517',Cerrado:'#6B6A64'}[p.estado_general]||'#7F77DD';
      L.circleMarker([p.lat,p.lon],{radius:8,fillColor:col,color:'#fff',weight:2,fillOpacity:.85}).addTo(m)
       .bindPopup(`<strong>${p.nombre}</strong><br>${p.estado_general||''}<br>${p.departamento||''}`);
    });
  },150);
}

function renderProyRows(ps){

  return ps.map(p=>{
    const pctP=p.pct_avance_proyecto||0,pctO=p.pct_ejecucion_obra||0,pctF=p.pct_avance_financiero||0;
    return`<tr class="clickable" onclick="nav('proyecto_detalle',{projectId:'${p.id}'})">
      <td style="color:var(--muted);font-size:12px">${esc(p.codigo||'—')}</td>
      <td><strong>${esc(p.nombre)}</strong>${p.departamento?`<div style="font-size:11px;color:var(--muted)">${esc(p.departamento)}${p.municipio?', '+esc(p.municipio):''}</div>`:''}</td>
      <td style="font-size:12px">${esc(p.profiles?.full_name||'—')}</td>
      <td style="font-size:11px;color:var(--muted)">${esc(p.estado_proyecto||'—')}</td>
      <td><span class="badge ${(p.estado_general||'').toLowerCase().replace(/\s/g,'')}">${esc(p.estado_general||'—')}</span></td>
      <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pctP}%;background:var(--bd)"></div></div><span class="prog-pct">${pctP}%</span></div></td>
      <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill ${pctO>=80?'green':pctO>=40?'':'amber'}" style="width:${pctO}%"></div></div><span class="prog-pct">${pctO}%</span></div></td>
      <td><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:${pctF}%;background:var(--tld)"></div></div><span class="prog-pct">${pctF}%</span></div></td>
      <td style="font-size:11px;color:var(--muted)">${esc(p.tipo_proyecto||'—')}</td>
      <td style="font-size:12px;text-align:right">$${fmtNum(p.inversion_usd||0)}</td>
      <td class="action-row" onclick="event.stopPropagation()">
        ${canEdit(p)?`<button class="icon-btn" onclick="openProyectoForm('${p.id}')">✏️</button>`:''}
        ${isCoord()?`<button class="icon-btn del" onclick="confirmDelete('proyectos','${p.id}')">🗑</button>`:''}

  }).join('');
}

function filterProy(){
  const s=v('fp-search').toLowerCase(),e=v('fp-estado'),t=v('fp-tipo'),n=v('fp-natural');
  const f=(window._proyData||[]).filter(p=>(!s||(p.nombre||'').toLowerCase().includes(s)||(p.codigo||'').toLowerCase().includes(s))&&(!e||p.estado_general===e)&&(!t||p.tipo_proyecto===t)&&(!n||p.naturaleza===n));

function exportarCSV(){

function switchPFTab(i){
  document.querySelectorAll('#pf-tabs .tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  for(let j=0;j<6;j++){const el=document.getElementById('pf-tab-'+j);if(el)el.style.display=j===i?'':'none';}
}

async function saveProyecto(id=''){
  const nombre=v('pf-nombre');if(!nombre.trim())return toast('El nombre es obligatorio.',true);
  const payload={
    codigo:v('pf-codigo'),nombre,pm_id:v('pf-pm_id')||null,lider_id:v('pf-lider_id')||null,
    sponsor_id:v('pf-sponsor_id')||null,portafolio_id:v('pf-portafolio_id')||null,programa_id:v('pf-programa_id')||null,
    estado_general:v('pf-estado_general'),estado_proyecto:v('pf-estado_proyecto'),
    tipo_proyecto:v('pf-tipo_proyecto'),tipificacion_proyecto:v('pf-tipificacion'),
    naturaleza:v('pf-naturaleza'),complejidad:v('pf-complejidad'),unidad_negocio:v('pf-unidad_negocio'),fondos:v('pf-fondos'),
    fecha_ingreso:v('pf-fecha_ingreso')||null,fecha_inicio_planificada:v('pf-fi_plan')||null,fecha_fin_planificada:v('pf-ff_plan')||null,
    fecha_inicio_real:v('pf-fi_real')||null,fecha_fin_real:v('pf-ff_real')||null,fecha_puesta_marcha:v('pf-f_puesta')||null,
    inversion_usd:numv('pf-inv_usd')||0,inversion_hnl:numv('pf-inv_hnl')||0,ejecutado_hnl:numv('pf-ejec_hnl')||0,
    nro_beneficiados:numv('pf-benef')||null,pct_avance_proyecto:numv('pf-pct_proy')||0,
    pct_ejecucion_obra:numv('pf-pct_obra')||0,pct_avance_financiero:numv('pf-pct_fin')||0,
    link_foto_principal:v('pf-foto_main'),departamento:v('pf-departamento'),municipio:v('pf-municipio'),
    zona_enee:v('pf-zona_enee'),sector_utcd:v('pf-sector_utcd'),
    lat:numv('pf-lat')||null,lon:numv('pf-lon')||null,direccion:v('pf-direccion'),
    descripcion:v('pf-descripcion'),alcance:v('pf-alcance'),objetivo:v('pf-objetivo'),beneficios:v('pf-beneficios'),
    updated_at:new Date().toISOString()
  };
  let error;
  if(id){({error}=await sb.from('proyectos').update(payload).eq('id',id));}
  else{({error}=await sb.from('proyectos').insert(payload));}
  if(error)return toast('Error: '+error.message,true);
  closeM('modal-proyecto');toast(id?'Proyecto actualizado.':'Proyecto creado.');
  if(id)nav('proyecto_detalle',{projectId:id});else nav('proyectos');
}

function switchProjTab(i){
  app.tab=i;
  document.querySelectorAll('#proj-tabs .tab-btn').forEach((b,j)=>b.classList.toggle('active',j===i));
  const{p,updates,adqLinks,riesgos,interesados,permisos,fotos,visitas}=window._projDetail||{};
  const id=p?.id;const tc=document.getElementById('proj-tab-content');
  if(i===0){tc.innerHTML=renderProjGeneral(p);initMiniMap();}
  else if(i===1){renderUpdatesTab(updates,id,p);}
  else if(i===2){tc.innerHTML=renderProjAdqs(adqLinks,id,p);}
  else if(i===3){tc.innerHTML=`<div class="section-head"><h2>EVM — Curva S</h2>${canEdit(p)?`<button class="btn-ghost" onclick="openEVM('${id}')">⚙ Gestionar datos</button>`:''}</div><div class="card"><canvas id="evm-canvas" height="120"></canvas></div>`;setTimeout(()=>renderEVMChart(id),100);}
  else if(i===4){tc.innerHTML=`<div class="section-head"><h2>Ficha técnica</h2><div style="display:flex;gap:8px"><button class="btn-ghost" onclick="exportFichaPDF('${id}')">⬇ PDF</button>${canEdit(p)?`<button class="btn-primary" onclick="openFicha('${id}','${p.naturaleza||''}')">✏️ Editar ficha</button>`:''}</div></div><div id="ficha-content"></div>`;loadFichaContent(id,p.naturaleza||'');}
  else if(i===5){renderRiesgosTab(riesgos,id,p);}
  else if(i===6){renderInteresadosTab(interesados,id,p);}
  else if(i===7){renderPermisosTab(permisos,id,p);}
  else if(i===8){renderFotosTab(fotos,id,p);}
  else if(i===9){tc.innerHTML=`<div class="section-head"><h2>Visitas técnicas</h2><button class="btn-primary" onclick="openVisitaForm(null,'${id}')">+ Agregar visita</button></div>${renderVisitasTable(visitas)}`;}
  /* ═══ FASE 2 · pestaña Cambios del proyecto ═══ */
  else if(i===10){renderCambiosTab(window._projDetail?.cambios||[],id,p);}
  /* ═══ FASE 3 · pestañas EDT y Timeline ═══ */
  else if(i===11){renderEDTTab(window._projDetail?.edt||[],id,p);}
  else if(i===12){renderTimelineTab(window._projDetail?.hitos||[],id,p);}
}

function renderRiskMatrix(riesgos){
  const getColor=n=>n>=20?'#A32D2D':n>=15?'#e06060':n>=10?'#FAEEDA':n>=5?'#d4c78a':'#EAF3DE';
  const getTC=n=>n>=15?'#fff':n>=10?'#854F0B':n>=5?'#4a3600':'#3B6D11';
  let h=`<div style="font-size:10px;color:var(--muted);margin-bottom:6px">← Probabilidad (fila) | Impacto (col) →</div>
    <div style="display:grid;grid-template-columns:20px repeat(5,1fr);gap:2px">
    <div></div>${[1,2,3,4,5].map(i=>`<div style="text-align:center;font-size:10px;color:var(--muted);padding:2px">${i}</div>`).join('')}`;
  for(let prob=5;prob>=1;prob--){
    h+=`<div style="font-size:10px;color:var(--muted);display:flex;align-items:center;justify-content:center">${prob}</div>`;
    for(let imp=1;imp<=5;imp++){
      const nivel=prob*imp;
      const pts=riesgos.filter(r=>r.probabilidad===prob&&r.impacto===imp);
      h+=`<div style="background:${getColor(nivel)};color:${getTC(nivel)};padding:5px 2px;border-radius:3px;text-align:center;font-size:11px;font-weight:600;min-height:30px;position:relative">${nivel}${pts.length?`<span style="position:absolute;top:1px;right:2px;background:rgba(0,0,0,.25);border-radius:50%;width:13px;height:13px;font-size:9px;display:flex;align-items:center;justify-content:center">${pts.length}</span>`:''}</div>`;
    }
  }
  h+=`</div><div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
    <span style="font-size:10px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#EAF3DE;border-radius:2px;display:inline-block"></span>Bajo</span>
    <span style="font-size:10px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#FAEEDA;border-radius:2px;display:inline-block"></span>Medio</span>
    <span style="font-size:10px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#FCEBEB;border-radius:2px;display:inline-block"></span>Alto</span>
    <span style="font-size:10px;display:flex;align-items:center;gap:3px"><span style="width:10px;height:10px;background:#A32D2D;border-radius:2px;display:inline-block"></span>Crítico</span>
  </div>`;
  return h;
}

  const alertas=permisos.filter(pe=>{
    if(!pe.fecha_vencimiento||pe.estado!=='Aprobado')return false;
    return Math.ceil((new Date(pe.fecha_vencimiento)-new Date())/(1000*60*60*24))<=(pe.alerta_dias||30);
  });
  tc.innerHTML=`<div class="section-head"><h2>Permisología</h2>${canEdit(p)?`<button class="btn-primary" onclick="openPermisoForm(null,'${proyId}')">+ Agregar permiso</button>`:''}</div>

        const dias=pe.fecha_vencimiento?Math.ceil((new Date(pe.fecha_vencimiento)-new Date())/(1000*60*60*24)):null;

        return`<tr>
          <td><strong>${esc(pe.nombre_permiso)}</strong></td>

          <td style="font-size:12px">${esc(pe.entidad||'—')}</td>

          <td style="font-size:12px">${esc(pe.numero_permiso||'—')}</td>
          <td style="font-size:12px">${fmtDate(pe.fecha_aprobacion)}</td>
          <td style="font-size:12px;color:${vencAlt?'var(--rd)':'inherit'}">${fmtDate(pe.fecha_vencimiento)}${vencAlt?` <span style="font-size:10px">(${dias}d)</span>`:''}</td>

        </tr>`;
      }).join('')}</tbody>

}

async function saveFicha(proyId,nat,fichaId=''){
  const tables={SUBESTACION:'ficha_subestacion',REDES:'ficha_redes',GENERACION:'ficha_generacion',TRANSMISION:'ficha_transmision'};
  const tbl=tables[nat];
  let payload={proyecto_id:proyId,updated_at:new Date().toISOString(),observaciones:v('ff-obs')};
  if(nat==='SUBESTACION')Object.assign(payload,{tipo_subestacion:v('ff-tipo'),nivel_tension_alta:numv('ff-ta'),nivel_tension_baja:numv('ff-tb'),potencia_mva:numv('ff-mva'),cant_transformadores:numv('ff-ct'),marca_transformador:v('ff-marca'),tipo_barra:v('ff-barra'),cant_bahias:numv('ff-bahias'),sistema_proteccion:v('ff-prot'),sistema_control:v('ff-ctrl'),area_terreno_m2:numv('ff-area'),empresa_constructora:v('ff-const'),empresa_supervision:v('ff-sup'),norma_aplicable:v('ff-norma')});
  if(nat==='REDES')Object.assign(payload,{tipo_red:v('ff-tred'),nivel_tension:numv('ff-ntens'),longitud_km:numv('ff-long'),calibre_conductor:v('ff-cal'),cant_circuitos:numv('ff-circ'),circuitos_nombres:v('ff-cnom'),cant_postes:numv('ff-post'),tipo_estructura:v('ff-est'),zona_geografica:v('ff-zona'),clientes_beneficiados:numv('ff-clib'),empresa_constructora:v('ff-const')});
  if(nat==='GENERACION')Object.assign(payload,{tipo_generacion:v('ff-tgen'),capacidad_mw:numv('ff-mw'),cantidad_unidades:numv('ff-uni'),marca_equipos:v('ff-marca'),combustible:v('ff-comb'),punto_interconexion:v('ff-pint'),nivel_tension_kv:numv('ff-tkv'),factor_planta:numv('ff-fp'),empresa_constructora:v('ff-const')});
  if(nat==='TRANSMISION')Object.assign(payload,{tipo_linea:v('ff-tlin'),nivel_tension_kv:numv('ff-tkv'),longitud_km:numv('ff-long'),calibre_conductor:v('ff-cal'),cant_circuitos:numv('ff-circ'),tipo_estructura:v('ff-est'),subestacion_origen:v('ff-seo'),subestacion_destino:v('ff-sed'),empresa_constructora:v('ff-const')});
  let error;
  if(fichaId){({error}=await sb.from(tbl).update(payload).eq('id',fichaId));}

async function exportFichaPDF(proyId){
  toast('Generando PDF...');
  const{jsPDF}=window.jspdf;
  const[{data:p},{data:fotos}]=await Promise.all([
    sb.from('proyectos').select('*,portafolios(nombre),profiles!proyectos_pm_id_fkey(full_name)').eq('id',proyId).single(),
    sb.from('registro_fotografico').select('*').eq('proyecto_id',proyId).order('fecha',{ascending:false}).limit(1)
  ]);
  if(!p)return toast('Proyecto no encontrado.',true);
  const tables={SUBESTACION:'ficha_subestacion',REDES:'ficha_redes',GENERACION:'ficha_generacion',TRANSMISION:'ficha_transmision'};
  const tbl=tables[p.naturaleza];
  const{data:ficha}=tbl?await sb.from(tbl).select('*').eq('proyecto_id',proyId).single():{data:null};
  const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});
  /* FASE 2 · helpers de branding */
  addPdfHeader(doc,'FICHA TÉCNICA');
  addPdfWatermark(doc,true);
  doc.setTextColor(30);
  doc.setFontSize(16);doc.setFont(undefined,'bold');doc.text((p.nombre||'').substring(0,60),15,34);
  doc.setFont(undefined,'normal');doc.setFontSize(10);doc.setTextColor(100);
  doc.text(`${p.codigo||''} | ${p.naturaleza||''} | ${p.estado_general||''}`,15,41);
  doc.line(15,45,195,45);
  let y=52;
  const addSec=(t)=>{if(y>260){doc.addPage();y=20;}doc.setFontSize(11);doc.setFont(undefined,'bold');doc.setTextColor(127,119,221);doc.text(t,15,y);y+=6;doc.setFont(undefined,'normal');doc.setTextColor(60);};
  const addRow=(l,val)=>{if(!val&&val!==0)return;if(y>270){doc.addPage();y=20;}doc.setFontSize(9);doc.setTextColor(120);doc.text(l+':',15,y);doc.setTextColor(40);doc.text(String(val).substring(0,80),70,y);y+=5;};
  addSec('Información General');
  addRow('Depto./Municipio',`${p.departamento||''}${p.municipio?', '+p.municipio:''}`);
  addRow('Zona ENEE',p.zona_enee);addRow('PM',p.profiles?.full_name);
  addRow('Portafolio',p.portafolios?.nombre);addRow('Inversión USD','$'+fmtNum(p.inversion_usd||0));
  addRow('Inicio plan.',fmtDate(p.fecha_inicio_planificada));addRow('Fin plan.',fmtDate(p.fecha_fin_planificada));
  addRow('% Avance proyecto',(p.pct_avance_proyecto||0)+'%');addRow('% Obra',(p.pct_ejecucion_obra||0)+'%');
  y+=4;
  if(ficha){addSec('Datos Técnicos');Object.entries(ficha).forEach(([k,v2])=>{if(['id','proyecto_id','created_at','updated_at'].includes(k))return;if(v2!==null&&v2!=='')addRow(k.replace(/_/g,' '),v2);});}
  if(p.descripcion){addSec('Descripción');const lines=doc.splitTextToSize(p.descripcion,175);doc.setFontSize(9);doc.setTextColor(60);lines.forEach(l=>{if(y>270){doc.addPage();addPdfWatermark(doc,false);y=20;}doc.text(l,15,y);y+=5;});}
  /* FASE 2 · footer unificado */
  addPdfFooter(doc);
  doc.save(`ficha_tecnica_${(p.codigo||p.id||'').replace(/[^a-z0-9]/gi,'_')}.pdf`);
}

async function saveAdq(id='',proyId=''){
  const nombre=v('af-nombre');if(!nombre.trim())return toast('El nombre es obligatorio.',true);
  const payload={nombre,descripcion:v('af-desc'),tipo:v('af-tipo')||'contrato',estado:v('af-estado'),fondo_entidad:v('af-fondo_e')||null,fondo_tipo:v('af-fondo_t')||null,moneda:v('af-moneda'),presupuesto:numv('af-pres')||0,solped_numero:v('af-solped'),solped_fecha:v('af-fsolped')||null,link_proceso:v('af-link_proc')||null,contrato_consecutivo:v('af-cont_cons'),contrato_empresa:v('af-cont_emp'),contrato_monto:numv('af-cont_monto')||null,contrato_fecha_firma:v('af-cont_ffirma')||null,contrato_fecha_inicio:v('af-cont_fi')||null,contrato_fecha_fin:v('af-cont_ff')||null,link_contrato:v('af-link_cont')||null,updated_at:new Date().toISOString()};
  let adqId=id,error;
  if(id){({error}=await sb.from('adquisiciones').update(payload).eq('id',id));}
  else{const{data:ins,error:err}=await sb.from('adquisiciones').insert(payload).select().single();error=err;adqId=ins?.id;}
  if(error)return toast('Error: '+error.message,true);
  if(adqId){const sel=document.getElementById('af-proy');const selected=sel?Array.from(sel.selectedOptions).map(o=>o.value).filter(Boolean):[];if(selected.length){await sb.from('proyecto_adquisicion').delete().eq('adquisicion_id',adqId);await sb.from('proyecto_adquisicion').insert(selected.map(pid=>({proyecto_id:pid,adquisicion_id:adqId})));}}
  closeM('modal-adq');toast('Adquisición guardada.');
  if(app.view==='adquisiciones')nav('adquisiciones');else nav('proyecto_detalle',{projectId:app.projectId});
}

// ───────── 1. Helpers de reportes PDF (branding, header, footer, watermark) ─────────

/** Parsea un hex '#RRGGBB' a [r,g,b] numérico 0–255. */
function hexToRgb(hex){
  if(!hex||typeof hex!=='string')return[127,119,221];
  const h=hex.replace('#','');
  if(h.length!==6)return[127,119,221];
  return[parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];
}

/** Devuelve config PDF completa derivada de app.config con defaults seguros. */
function getReportConfig(){
  const c=app.config||{};
  return{
    sysName:      c.system_name||'PMO SGP',
    sysSub:       c.system_sub||'UTCD — ENEE',
    title:        c.pdf_institutional_title||c.pdf_title||'PMO — Sistema de Gestión de Proyectos',
    subtitle:     c.pdf_institutional_subtitle||'UTCD — ENEE',
    primary:      c.primary_color||'#7F77DD',
    secondary:    c.pdf_secondary_color||'#534AB7',
    logoUrl:      c.logo_url||'',
    watermarkUrl: c.pdf_watermark_url||'',
    watermarkOp:  parseFloat(c.pdf_watermark_opacity)||0.08,
    watermarkPos: c.pdf_watermark_position||'todas',
    showDate:     c.pdf_show_date!=='0',
    showUser:     c.pdf_show_user!=='0',
    showFooter:   c.pdf_show_footer!=='0',
    footerText:   c.pdf_footer_text||'Documento confidencial — Uso interno'
  };
}

/** Aplica color primario al fillColor actual del doc. */
function applyPdfBranding(doc){
  const cfg=getReportConfig();
  const[r,g,b]=hexToRgb(cfg.primary);
  doc.setFillColor(r,g,b);
}

/** Header estándar: barra primaria 20mm + sysName izquierda + título derecha. */
function addPdfHeader(doc,sectionTitle=''){
  const cfg=getReportConfig();
  const[r,g,b]=hexToRgb(cfg.primary);
  const pageW=doc.internal.pageSize.getWidth();
  doc.setFillColor(r,g,b);doc.rect(0,0,pageW,20,'F');
  doc.setTextColor(255);doc.setFontSize(13);doc.setFont(undefined,'bold');
  doc.text(cfg.sysName,15,12);
  doc.setFont(undefined,'normal');doc.setFontSize(9);
  doc.text(cfg.subtitle||cfg.sysSub,15,17);
  if(sectionTitle){doc.setFontSize(10);doc.setFont(undefined,'bold');doc.text(sectionTitle,pageW-15,13,{align:'right'});doc.setFont(undefined,'normal');}
  doc.setTextColor(30);
}

/** Footer estándar: línea + info generada + pie de página + paginación. */
function addPdfFooter(doc){
  const cfg=getReportConfig();
  const pageW=doc.internal.pageSize.getWidth();
  const pageH=doc.internal.pageSize.getHeight();
  const pageCount=doc.internal.getNumberOfPages();
  for(let i=1;i<=pageCount;i++){
    doc.setPage(i);
    doc.setDrawColor(200);doc.setLineWidth(0.2);
    doc.line(15,pageH-14,pageW-15,pageH-14);
    doc.setFontSize(8);doc.setTextColor(140);
    const parts=[];
    if(cfg.showDate)parts.push('Generado: '+new Date().toLocaleString('es-HN'));
    if(cfg.showUser)parts.push('Por: '+(app.profile?.full_name||app.user?.email||'—'));
    parts.push(cfg.sysName);
    doc.text(parts.join(' · '),15,pageH-8);
    if(cfg.showFooter&&cfg.footerText){doc.text(cfg.footerText,pageW/2,pageH-3,{align:'center'});}
    doc.setFontSize(8);doc.text(`Pág. ${i} / ${pageCount}`,pageW-15,pageH-8,{align:'right'});
  }
  doc.setTextColor(30);
}

/** Watermark opcional. Solo se dibuja si hay URL configurada y la página actual lo permite.
 *  Se debe llamar después de addPage y antes de dibujar contenido nuevo.
 *  isFirstPage: true en la primera página; false en páginas subsiguientes. */
function addPdfWatermark(doc,isFirstPage=false){
  const cfg=getReportConfig();
  if(!cfg.watermarkUrl)return;
  const pos=cfg.watermarkPos;
  // Si es 'portada' solo la primera, si es 'centro' solo la primera, 'todas' siempre.
  if((pos==='portada'||pos==='centro')&&!isFirstPage)return;
  try{
    const pageW=doc.internal.pageSize.getWidth();
    const pageH=doc.internal.pageSize.getHeight();
    const wmW=110;const wmH=110;
    const x=(pageW-wmW)/2;const y=(pageH-wmH)/2;
    // setGState: opacity en jsPDF 2.x
    if(doc.GState){
      const gs=new doc.GState({opacity:cfg.watermarkOp});
      doc.setGState(gs);
      doc.addImage(cfg.watermarkUrl,'PNG',x,y,wmW,wmH,'','FAST');
      const gs2=new doc.GState({opacity:1});doc.setGState(gs2);
    }else{
      doc.addImage(cfg.watermarkUrl,'PNG',x,y,wmW,wmH,'','FAST');
    }
  }catch(e){/* URL inválida o CORS — se ignora silenciosamente */}
}

/** Dado report_type y field_key, devuelve true si está habilitado.
 *  Si no existe configuración, devuelve true por defecto (no bloquea). */
function shouldPrintField(reportType,fieldKey){
  const map=app.reportFields&&app.reportFields[reportType];
  if(!map)return true;
  const entry=map[fieldKey];
  return entry===undefined?true:!!entry;
}

/** Devuelve un objeto {field_key: enabled} para un reportType dado. */
function getEnabledReportFields(reportType){
  const map=app.reportFields&&app.reportFields[reportType];
  return map||{};
}

/** Carga toda la config de report_field_config en app.reportFields. */
async function loadReportFields(){
  const{data}=await sb.from('report_field_config').select('*');
  app.reportFields={};
  (data||[]).forEach(r=>{
    if(!app.reportFields[r.report_type])app.reportFields[r.report_type]={};
    app.reportFields[r.report_type][r.field_key]=r.enabled;
  });
}

function filterCambios(){
  const s=(v('cf-search')||'').toLowerCase();
  const pid=v('cf-proy'),est=v('cf-estado'),tipo=v('cf-tipo'),pri=v('cf-prioridad');
  const d1=v('cf-desde'),d2=v('cf-hasta');
  const arr=(window._cambiosData||[]).filter(c=>
    (!s||(c.titulo||'').toLowerCase().includes(s)||(c.numero_solicitud||'').toLowerCase().includes(s)||(c.descripcion||'').toLowerCase().includes(s))&&
    (!pid||c.proyecto_id===pid)&&
    (!est||c.estado===est)&&
    (!tipo||c.tipo_cambio===tipo)&&
    (!pri||c.prioridad===pri)&&
    (!d1||(c.fecha_solicitud&&c.fecha_solicitud>=d1))&&
    (!d2||(c.fecha_solicitud&&c.fecha_solicitud<=d2))
  );
  renderCambiosBody(arr);
}

      <div class="field"><label>Link documento</label><input type="url" id="cmf-doc" value="${esc(c.link_documento||'')}"${ro} placeholder="https://..."></div>
      <div class="field"><label>Link soporte</label><input type="url" id="cmf-sop" value="${esc(c.link_soporte||'')}"${ro} placeholder="https://..."></div>
      <div class="field full"><label>Observaciones</label><textarea id="cmf-obs"${ro}>${esc(c.observaciones||'')}</textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="closeM('modal-cambio')">${readOnly?'Cerrar':'Cancelar'}</button>
      ${readOnly?'':`<button class="btn-primary" onclick="saveCambio('${id||''}')">💾 Guardar solicitud</button>`}
    </div>`;
  openM('modal-cambio');
}

async function saveCambio(id){
  const proyId=v('cmf-proy');
  const titulo=v('cmf-titulo');
  if(!proyId)return toast('Selecciona un proyecto.',true);
  if(!titulo)return toast('El título es obligatorio.',true);
  const payload={
    proyecto_id: proyId,
    numero_solicitud: v('cmf-num')||null,
    fecha_solicitud: v('cmf-fsol')||null,
    solicitante: v('cmf-solic')||null,
    tipo_cambio: v('cmf-tipo')||null,
    titulo: titulo,
    descripcion: v('cmf-desc')||null,
    justificacion: v('cmf-just')||null,
    impacto_alcance: v('cmf-imp-alc')||null,
    impacto_cronograma: v('cmf-imp-cron')||null,
    impacto_costo: numv('cmf-imp-costo')||0,
    impacto_calidad: v('cmf-imp-cal')||null,
    impacto_riesgos: v('cmf-imp-riesgos')||null,
    dias_impacto: parseInt(v('cmf-imp-dias'))||0,
    estado: v('cmf-estado')||'Solicitado',
    prioridad: v('cmf-prioridad')||'Media',
    responsable_analisis: v('cmf-resp')||null,
    aprobador: v('cmf-aprob')||null,
    decision: v('cmf-decision')||null,
    fecha_aprobacion: v('cmf-faprob')||null,
    fecha_implementacion: v('cmf-fimpl')||null,
    link_documento: v('cmf-doc')||null,
    link_soporte: v('cmf-sop')||null,
    observaciones: v('cmf-obs')||null,
    usuario_id: app.user?.id||null,
    updated_at: new Date().toISOString()
  };
  const{error}=id
    ?await sb.from('cambios_proyecto').update(payload).eq('id',id)
    :await sb.from('cambios_proyecto').insert(payload);
  if(error)return toast('Error: '+error.message,true);
  closeM('modal-cambio');toast(id?'Solicitud actualizada.':'Solicitud creada.');
  // Si estamos en el detalle del proyecto, recargar; si no, recargar vista cambios
  if(app.view==='proyecto_detalle')nav('proyecto_detalle',{projectId:app.projectId});
  else render();
}

// MÓDULO 1 · EXPORT PDF DE PROYECTO (respeta report_field_config)

async function exportProyectoPDF(proyId){
  toast('Generando PDF del proyecto...');
  try{
    // Siempre refrescar config de campos antes de generar (por si cambió)
    await loadReportFields();

    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'p',unit:'mm',format:'a4'});

    // Cargar todo en paralelo
    const[{data:p},{data:updates},{data:riesgos},{data:permisos},{data:fotos},{data:visitas},{data:cambios},{data:evm},{data:edt},{data:hitos},{data:adqLinks}]=await Promise.all([
      sb.from('proyectos').select('*,profiles!proyectos_pm_id_fkey(full_name),portafolios(nombre),programas(nombre),sponsor:personas!proyectos_sponsor_id_fkey(nombre),lider_persona:personas!proyectos_lider_persona_id_fkey(nombre)').eq('id',proyId).single(),
      sb.from('actualizaciones').select('*,profiles(full_name)').eq('proyecto_id',proyId).order('fecha',{ascending:false}).limit(10),
      sb.from('riesgos_proyecto').select('*').eq('proyecto_id',proyId).order('nivel',{ascending:false}),
      sb.from('permisos_proyecto').select('*').eq('proyecto_id',proyId).order('fecha_vencimiento'),
      sb.from('registro_fotografico').select('*').eq('proyecto_id',proyId).order('fecha',{ascending:false}).limit(4),
      sb.from('visitas_tecnicas').select('*').eq('proyecto_id',proyId).order('fecha',{ascending:false}).limit(10),
      sb.from('cambios_proyecto').select('*').eq('proyecto_id',proyId).order('fecha_solicitud',{ascending:false}),
      sb.from('evm_linea_base').select('*').eq('proyecto_id',proyId).order('fecha',{ascending:false}).limit(1),
      sb.from('edt_componentes').select('*').eq('proyecto_id',proyId).order('orden'),
      sb.from('hitos_proyecto').select('*').eq('proyecto_id',proyId).order('fecha_planificada'),
      sb.from('proyecto_adquisicion').select('adquisiciones(*)').eq('proyecto_id',proyId)
    ]);

    if(!p){toast('Proyecto no encontrado.',true);return;}

    // Helper: ¿campo habilitado?
    const show=(k)=>shouldPrintField('reporte_proyecto',k);

    // Header y watermark primera página
    addPdfHeader(doc,'REPORTE DE PROYECTO');
    addPdfWatermark(doc,true);
    doc.setTextColor(30);

    // Título grande del proyecto (siempre, aunque codigo/nombre estén ocultos no tendría sentido)
    doc.setFontSize(16);doc.setFont(undefined,'bold');
    doc.text((p.nombre||'Sin nombre').substring(0,70),15,34);
    doc.setFont(undefined,'normal');doc.setFontSize(10);doc.setTextColor(100);
    const subl=[p.codigo||'',p.naturaleza||'',p.estado_general||''].filter(Boolean).join(' · ');
    if(subl)doc.text(subl,15,41);
    doc.line(15,45,195,45);
    doc.setTextColor(30);

    let y=52;
    const cfg=getReportConfig();
    const[pr,pg,pb]=hexToRgb(cfg.primary);

    // Helpers locales
    const addSec=(t)=>{
      if(y>260){doc.addPage();addPdfWatermark(doc,false);y=20;}
      y+=2;
      doc.setFontSize(11);doc.setFont(undefined,'bold');doc.setTextColor(pr,pg,pb);
      doc.text(t,15,y);y+=2;
      doc.setDrawColor(pr,pg,pb);doc.setLineWidth(0.3);doc.line(15,y,195,y);y+=5;
      doc.setFont(undefined,'normal');doc.setTextColor(60);
    };
    const addRow=(l,val)=>{
      if(val===null||val===undefined||val==='')return;
      if(y>272){doc.addPage();addPdfWatermark(doc,false);y=20;}
      doc.setFontSize(9);doc.setTextColor(115);
      doc.text(l+':',15,y);
      doc.setTextColor(40);
      const txt=String(val);
      const wrapped=doc.splitTextToSize(txt,115);
      doc.text(wrapped,70,y);
      y+=5*Math.max(1,wrapped.length);
    };
    const addPara=(val,maxW=175)=>{
      if(!val)return;
      if(y>270){doc.addPage();addPdfWatermark(doc,false);y=20;}
      doc.setFontSize(9);doc.setTextColor(60);
      const lines=doc.splitTextToSize(String(val),maxW);
      lines.forEach(l=>{if(y>272){doc.addPage();addPdfWatermark(doc,false);y=20;}doc.text(l,15,y);y+=4.5;});
      y+=2;
    };

    // ──────────────── INFORMACIÓN GENERAL ────────────────
    const sec1=[
      ['codigo','Código',p.codigo],
      ['nombre','Nombre',p.nombre],
      ['tipo_proyecto','Tipo de proyecto',p.tipo_proyecto],
      ['naturaleza','Naturaleza',p.naturaleza],
      ['estado_general','Estado general',p.estado_general],
      ['estado_proyecto','Etapa',p.estado_proyecto]
    ].filter(([k])=>show(k));
    if(sec1.length){
      addSec('Información general');
      sec1.forEach(([,l,v])=>addRow(l,v));
      y+=2;
    }

    // ──────────────── ORGANIZACIÓN Y RESPONSABLES ────────────────
    const sec2=[
      ['pm','PM',p.profiles?.full_name],
      ['lider','Líder',p.lider_persona?.nombre],
      ['sponsor','Sponsor',p.sponsor?.nombre],
      ['portafolio','Portafolio',p.portafolios?.nombre],
      ['programa','Programa',p.programas?.nombre],
      ['unidad_responsable','Unidad responsable',p.unidad_responsable||p.unidad_negocio]
    ].filter(([k,,v])=>show(k)&&v);
    if(sec2.length){
      addSec('Organización y responsables');
      sec2.forEach(([,l,v])=>addRow(l,v));
      y+=2;
    }

    // ──────────────── DESCRIPCIÓN ────────────────
    if(show('descripcion')&&p.descripcion){addSec('Descripción');addPara(p.descripcion);}
    if(show('alcance')&&p.alcance){addSec('Alcance');addPara(p.alcance);}
    if(show('objetivo')&&p.objetivo){addSec('Objetivo');addPara(p.objetivo);}
    if(show('beneficios')&&p.beneficios){addSec('Beneficios');addPara(p.beneficios);}

    // ──────────────── FECHAS ────────────────
    const fPlan=show('fechas_plan')&&(p.fecha_inicio_planificada||p.fecha_fin_planificada);
    const fReal=show('fechas_real')&&(p.fecha_inicio_real||p.fecha_fin_real||p.fecha_puesta_marcha);
    if(fPlan||fReal){
      addSec('Fechas clave');
      if(fPlan){
        addRow('Inicio planificado',fmtDate(p.fecha_inicio_planificada));
        addRow('Fin planificado',fmtDate(p.fecha_fin_planificada));
      }
      if(fReal){
        addRow('Inicio real',fmtDate(p.fecha_inicio_real));
        addRow('Fin real',fmtDate(p.fecha_fin_real));
        addRow('Puesta en marcha',fmtDate(p.fecha_puesta_marcha));
      }
      y+=2;
    }

    // ──────────────── FINANCIERO ────────────────
    const sec4=[
      ['inversion_usd','Inversión USD',p.inversion_usd?('$'+fmtNum(p.inversion_usd)):null],
      ['inversion_hnl','Inversión HNL',p.inversion_hnl?('L'+fmtNum(p.inversion_hnl)):null],
      ['ejecutado_hnl','Ejecutado HNL',p.ejecutado_hnl?('L'+fmtNum(p.ejecutado_hnl)):null]
    ].filter(([k,,v])=>show(k)&&v);
    if(sec4.length){
      addSec('Información financiera');
      sec4.forEach(([,l,v])=>addRow(l,v));
      y+=2;
    }

    // ──────────────── AVANCES ────────────────
    const avances=[
      ['pct_avance_proyecto','% Avance proyecto',p.pct_avance_proyecto],
      ['pct_ejecucion_obra','% Avance obra',p.pct_ejecucion_obra],
      ['pct_avance_financiero','% Avance financiero',p.pct_avance_financiero]
    ].filter(([k])=>show(k));
    if(avances.length){
      addSec('Avances');
      avances.forEach(([,l,v])=>{
        if(v===null||v===undefined)return;
        if(y>265){doc.addPage();addPdfWatermark(doc,false);y=20;}
        doc.setFontSize(9);doc.setTextColor(115);doc.text(l+':',15,y);
        doc.setTextColor(40);doc.text(String(v||0)+'%',70,y);
        // Barra
        const barX=95,barW=95,barH=3;
        doc.setFillColor(230,230,230);doc.rect(barX,y-2.5,barW,barH,'F');
        doc.setFillColor(pr,pg,pb);doc.rect(barX,y-2.5,barW*((v||0)/100),barH,'F');
        y+=6;
      });
      y+=2;
    }

    // ──────────────── UBICACIÓN ────────────────
    const sec5=[
      ['departamento','Departamento',p.departamento],
      ['municipio','Municipio',p.municipio],
      ['zona_enee','Zona ENEE',p.zona_enee],
      ['sector_utcd','Sector UTCD',p.sector_utcd],
      ['ubicacion','Dirección',p.direccion],
      ['ubicacion','Coordenadas',(p.lat&&p.lon)?(p.lat+', '+p.lon):null]
    ].filter(([k,,v])=>show(k)&&v);
    if(sec5.length){
      addSec('Ubicación');
      sec5.forEach(([,l,v])=>addRow(l,v));
      y+=2;
    }

    // ──────────────── TÉCNICO ────────────────
    if(show('circuitos_asociados')&&p.circuitos_asociados){
      addSec('Circuitos asociados');
      addPara(p.circuitos_asociados);
    }

    // ──────────────── RIESGOS ────────────────
    if(show('riesgos')&&(riesgos||[]).length){
      addSec('Riesgos principales (top 10)');
      doc.setFontSize(9);doc.setTextColor(60);
      (riesgos||[]).slice(0,10).forEach(r=>{
        if(y>265){doc.addPage();addPdfWatermark(doc,false);y=20;}
        const col=r.nivel>=20?[163,45,45]:r.nivel>=10?[186,117,23]:[59,109,17];
        doc.setFillColor(...col);doc.circle(17,y-1,1.5,'F');

        const tx=`${r.consecutivo||'R-?'} · ${(r.riesgo||'').substring(0,70)} · N${r.nivel||0} · ${r.estado||''}`;

      (updates||[]).slice(0,10).forEach(u=>{
        if(y>260){doc.addPage();addPdfWatermark(doc,false);y=20;}
        doc.setFont(undefined,'bold');
        doc.text(`${fmtDate(u.fecha)} · ${u.profiles?.full_name||'—'}`,15,y);y+=4;
        doc.setFont(undefined,'normal');
        if(u.notas){const ls=doc.splitTextToSize(u.notas.substring(0,200),175);ls.forEach(l=>{if(y>270){doc.addPage();addPdfWatermark(doc,false);y=20;}doc.text(l,17,y);y+=4;});}
        y+=1;
      });
      y+=2;
    }

    // ──────────────── VISITAS TÉCNICAS ────────────────
    if(show('visitas')&&(visitas||[]).length){
      addSec('Visitas técnicas (últimas 10)');
      doc.setFontSize(9);doc.setTextColor(60);
      (visitas||[]).slice(0,10).forEach(v2=>{
        if(y>265){doc.addPage();addPdfWatermark(doc,false);y=20;}

    if(show('evm')&&(evm||[]).length){

      if(e.ac!==null&&e.ac!==undefined)addRow('AC (Costo real)','$'+fmtNum(e.ac));
      if(e.ev&&e.pv)addRow('SPI',(e.ev/e.pv).toFixed(2));
      if(e.ev&&e.ac)addRow('CPI',(e.ev/e.ac).toFixed(2));

    // ──────────────── CAMBIOS ────────────────
    if(show('cambios')&&(cambios||[]).length){
      addSec('Gestión de cambios');
      doc.setFontSize(9);doc.setTextColor(60);
      const cEstados={};(cambios||[]).forEach(c=>{cEstados[c.estado]=(cEstados[c.estado]||0)+1;});
      const resumenC=Object.entries(cEstados).map(([k,n])=>`${k}: ${n}`).join(' · ');
      addRow('Resumen',resumenC);
      const impC=(cambios||[]).reduce((s,c)=>s+(Number(c.impacto_costo)||0),0);
      const impD=(cambios||[]).reduce((s,c)=>s+(Number(c.dias_impacto)||0),0);
      addRow('Impacto total costo','$'+fmtNum(impC));
      addRow('Impacto total días',impD);
      y+=2;
      (cambios||[]).slice(0,10).forEach(c=>{
        if(y>265){doc.addPage();addPdfWatermark(doc,false);y=20;}
        const tx=`• ${c.numero_solicitud||'SC-?'} · ${(c.titulo||'').substring(0,55)} · ${c.estado||''} · ${c.prioridad||''}`;
        doc.text(tx,15,y);y+=4.5;
      });
      y+=2;
    }

    // ──────────────── EDT ────────────────
    if(show('edt')&&(edt||[]).length){
      addSec('EDT / WBS');
      const totalPeso=(edt||[]).reduce((s,c)=>s+(Number(c.peso)||0),0);
      const avanceEDT=totalPeso?((edt||[]).reduce((s,c)=>s+(Number(c.peso)||0)*(Number(c.avance)||0),0)/totalPeso):0;
      const obras=(edt||[]).filter(c=>c.es_obra);
      const pesoObra=obras.reduce((s,c)=>s+(Number(c.peso)||0),0);
      const avanceObra=pesoObra?(obras.reduce((s,c)=>s+(Number(c.peso)||0)*(Number(c.avance)||0),0)/pesoObra):0;
      addRow('Componentes totales',(edt||[]).length);

      y+=2;
    }

    // ──────────────── TIMELINE / HITOS ────────────────
    if(show('timeline')&&(hitos||[]).length){
      addSec('Timeline / Hitos');
      doc.setFontSize(9);doc.setTextColor(60);
      (hitos||[]).slice(0,20).forEach(h=>{
        if(y>265){doc.addPage();addPdfWatermark(doc,false);y=20;}
        const dot=h.estado==='Completado'?'●':h.estado==='Atrasado'?'▲':'○';
        const tx=`${dot} ${(h.nombre||'').substring(0,50)} · plan: ${fmtDate(h.fecha_planificada)}${h.fecha_real?' · real: '+fmtDate(h.fecha_real):''} · ${h.estado||''}`;
        doc.text(tx,15,y);y+=4.5;
      });
      y+=2;
    }

    // ──────────────── FOTOGRAFÍAS ────────────────
    if(show('fotografias')&&(fotos||[]).length){
      addSec('Fotografías');
      // Dejamos los nombres/descripciones; cargar imágenes remotas en jsPDF puede fallar por CORS
      doc.setFontSize(9);doc.setTextColor(60);
      (fotos||[]).slice(0,6).forEach(f=>{
        if(y>265){doc.addPage();addPdfWatermark(doc,false);y=20;}
        const tx=`• ${(f.descripcion||'Sin descripción').substring(0,60)} · ${fmtDate(f.fecha)}`;
        doc.text(tx,15,y);y+=4;
        if(f.url_imagen){doc.setTextColor(100,120,200);doc.textWithLink((f.url_imagen||'').substring(0,80),17,y,{url:f.url_imagen});doc.setTextColor(60);y+=5;}
      });
      y+=2;
    }

    // Footer (al final, cubre todas las páginas)
    addPdfFooter(doc);

    const fname=`proyecto_${(p.codigo||p.id||'reporte').replace(/[^a-z0-9]/gi,'_')}.pdf`;
    doc.save(fname);
    toast('PDF generado.');
  }catch(err){
    console.error(err);
    toast('Error generando PDF: '+(err.message||err),true);
  }
}

/** Calcula avance ponderado sobre un array de componentes EDT.
 *  Devuelve {pct, pesoTotal, countCompletado, countEjec, countBloq} */
function computeEDTStats(items, onlyObra=false){
  const arr=(items||[]).filter(c=>onlyObra?c.es_obra:true);
  const pesoTotal=arr.reduce((s,c)=>s+(Number(c.peso)||0),0);
  const sumPondAvance=arr.reduce((s,c)=>s+(Number(c.peso)||0)*(Number(c.avance)||0),0);
  const pct=pesoTotal>0?(sumPondAvance/pesoTotal):0;
  return{
    pct:Math.round(pct*10)/10,
    pesoTotal:pesoTotal,
    count:arr.length,
    countCompletado:arr.filter(c=>c.estado==='Completado').length,
    countEjec:arr.filter(c=>c.estado==='En ejecución').length,
    countBloq:arr.filter(c=>c.estado==='Bloqueado').length
  };
}

/** Ordena componentes EDT respetando jerarquía parent_id. */
function sortEDT(items){
  const byParent={};
  (items||[]).forEach(c=>{
    const k=c.parent_id||'__root__';
    if(!byParent[k])byParent[k]=[];
    byParent[k].push(c);
  });
  Object.keys(byParent).forEach(k=>{
    byParent[k].sort((a,b)=>(a.orden||0)-(b.orden||0));
  });
  const result=[];
  function walk(parentKey, depth){
    (byParent[parentKey]||[]).forEach(c=>{
      result.push({...c,_depth:depth});
      walk(c.id, depth+1);
    });
  }
  walk('__root__', 0);
  // Agregar huérfanos (parent_id que no existe)
  const includedIds=new Set(result.map(r=>r.id));
  (items||[]).forEach(c=>{if(!includedIds.has(c.id))result.push({...c,_depth:0});});
  return result;
}

async function saveEDT(id, proyId){
  const nombre=v('edf-nombre');
  if(!nombre)return toast('El nombre es obligatorio.',true);
  const avance=numv('edf-avance');
  if(avance!==null&&(avance<0||avance>100))return toast('El avance debe estar entre 0 y 100.',true);
  const payload={
    proyecto_id: proyId,
    parent_id: v('edf-parent')||null,
    codigo: v('edf-cod')||null,
    nombre: nombre,
    descripcion: v('edf-desc')||null,
    categoria: v('edf-cat')||null,
    tipo_componente: v('edf-tipo')||null,
    peso: numv('edf-peso')||0,
    avance: avance||0,
    estado: v('edf-estado')||'Pendiente',
    es_obra: document.getElementById('edf-obra').checked,
    responsable: v('edf-resp')||null,
    orden: parseInt(v('edf-orden'))||0,
    fecha_inicio_plan: v('edf-finiplan')||null,
    fecha_fin_plan: v('edf-ffinplan')||null,
    fecha_inicio_real: v('edf-finireal')||null,
    fecha_fin_real: v('edf-ffinreal')||null,
    observaciones: v('edf-obs')||null,
    updated_at: new Date().toISOString()
  };
  const{error}=id
    ? await sb.from('edt_componentes').update(payload).eq('id',id)
    : await sb.from('edt_componentes').insert(payload);
  if(error)return toast('Error: '+error.message,true);
  closeM('modal-edt');toast(id?'Componente actualizado.':'Componente creado.');
  nav('proyecto_detalle',{projectId:proyId});
}

/** Calcula días restantes hasta una fecha (YYYY-MM-DD). Negativo = vencido. */
function daysTo(dateStr){
  if(!dateStr)return null;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(dateStr+'T00:00:00');
  return Math.round((d-today)/(1000*60*60*24));
}

/** Clasifica un hito en una de: vencido, proximo (<=14d), completado, normal. */
function classifyHito(h){
  if(h.estado==='Completado')return 'completado';
  if(h.estado==='Cancelado')return 'cancelado';
  const dt=daysTo(h.fecha_planificada);
  if(dt===null)return 'normal';
  if(dt<0)return 'vencido';
  if(dt<=14)return 'proximo';
  return 'normal';
}

function filterTimeline(){
  const s=(v('tlf-search')||'').toLowerCase();
  const pid=v('tlf-proy'),porta=v('tlf-porta'),prog=v('tlf-prog'),est=v('tlf-estado'),crit=v('tlf-crit');
  const d1=v('tlf-desde'),d2=v('tlf-hasta');
  const arr=(window._tlHitos||[]).filter(h=>{
    const proj=h.proyectos||{};
    if(s&&!(h.nombre||'').toLowerCase().includes(s)&&!(proj.nombre||'').toLowerCase().includes(s))return false;
    if(pid&&proj.id!==pid)return false;
    if(porta&&proj.portafolio_id!==porta)return false;
    if(prog&&proj.programa_id!==prog)return false;
    if(est&&h.estado!==est)return false;
    if(crit&&h.criticidad!==crit)return false;
    if(d1&&(!h.fecha_planificada||h.fecha_planificada<d1))return false;
    if(d2&&(!h.fecha_planificada||h.fecha_planificada>d2))return false;
    return true;
  });
  applyTimelineRender(arr);
}

function applyTimelineRender(hitos){
  const c={vencido:0,proximo:0,completado:0,critico:0};
  (hitos||[]).forEach(h=>{
    const cls=classifyHito(h);
    if(cls==='vencido')c.vencido++;
    if(cls==='proximo')c.proximo++;
    if(cls==='completado')c.completado++;
    if(h.criticidad==='Crítica'&&h.estado!=='Completado'&&h.estado!=='Cancelado')c.critico++;
  });

  const resumen=`
    <div class="metric-grid" style="grid-template-columns:repeat(4,minmax(0,1fr))">
      <div class="metric-card"><div class="lbl">Vencidos</div><div class="val" style="color:${c.vencido?'var(--rd)':'var(--gd)'}">${c.vencido}</div><div class="sub">requieren acción</div></div>
      <div class="metric-card"><div class="lbl">Próximos (≤14 días)</div><div class="val" style="color:${c.proximo?'var(--ad)':'var(--gd)'}">${c.proximo}</div><div class="sub">por planear</div></div>
      <div class="metric-card"><div class="lbl">Completados</div><div class="val" style="color:var(--gd)">${c.completado}</div><div class="sub">del total visible</div></div>
      <div class="metric-card"><div class="lbl">Críticos activos</div><div class="val" style="color:${c.critico?'var(--rd)':'var(--text)'}">${c.critico}</div><div class="sub">criticidad alta/crítica</div></div>
    </div>`;

  const tl=renderTimelineGraph(hitos||[]);
  const tabla=renderTimelineTable(hitos||[]);
  document.getElementById('tl-body').innerHTML=resumen+tl+tabla;
}

/** Timeline gráfico: tarjetas agrupadas por mes (escala mensual). */
function renderTimelineGraph(hitos){
  if(!hitos.length)return `<div class="empty">Sin hitos que coincidan con los filtros.</div>`;
  // Agrupar por año-mes de fecha_planificada
  const groups={};
  const sin=[];
  hitos.forEach(h=>{
    if(!h.fecha_planificada){sin.push(h);return;}
    const k=h.fecha_planificada.substring(0,7); // YYYY-MM
    if(!groups[k])groups[k]=[];
    groups[k].push(h);
  });
  const keys=Object.keys(groups).sort();
  if(!keys.length&&!sin.length)return '';

  const monthLabel=(k)=>{
    const [y,m]=k.split('-');
    const names=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
    return `${names[parseInt(m,10)-1]} ${y}`;
  };

  const dotColor=(cls,crit)=>{
    if(cls==='completado')return '#639922';
    if(cls==='vencido')return '#A32D2D';
    if(cls==='proximo')return '#BA7517';
    if(cls==='cancelado')return '#9A9991';
    if(crit==='Crítica')return '#A32D2D';
    if(crit==='Alta')return '#BA7517';
    return 'var(--p)';
  };

  const cards=keys.map(k=>{
    const items=groups[k].sort((a,b)=>(a.fecha_planificada||'').localeCompare(b.fecha_planificada||''));
    return `<div style="min-width:260px;background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:12px;flex-shrink:0">
      <div style="font-size:11px;font-weight:600;color:var(--pd);text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px;border-bottom:0.5px solid var(--border);padding-bottom:6px">${monthLabel(k)} · ${items.length}</div>
      ${items.map(h=>{
        const cls=classifyHito(h);
        const col=dotColor(cls,h.criticidad);
        return `<div style="padding:7px 0;border-bottom:0.5px dashed var(--border);cursor:pointer" onclick="nav('proyecto_detalle',{projectId:'${(h.proyectos||{}).id||''}'})">
          <div style="display:flex;gap:6px;align-items:center;margin-bottom:3px">
            <span style="width:9px;height:9px;border-radius:50%;background:${col};flex-shrink:0"></span>
            <strong style="font-size:12px;line-height:1.2">${esc(h.nombre||'Sin nombre')}</strong>
          </div>
          <div style="font-size:10px;color:var(--muted);margin-left:15px">📁 ${esc((h.proyectos||{}).nombre||'—')}</div>
          <div style="font-size:10px;color:var(--muted);margin-left:15px">📅 ${fmtDate(h.fecha_planificada)}${h.fecha_real?' · real: '+fmtDate(h.fecha_real):''}</div>
          ${h.criticidad&&h.criticidad!=='Media'?`<span class="badge ${CRITICIDAD_BADGE[h.criticidad]||'activo'}" style="font-size:10px;margin-left:15px;margin-top:3px">${esc(h.criticidad)}</span>`:''}
        </div>`;
      }).join('')}
    </div>`;
  }).join('');

  return `<div class="card" style="margin-bottom:1rem"><div class="card-title">Cronograma mensual</div>
    <div style="display:flex;gap:12px;overflow-x:auto;padding:4px 2px">${cards}</div>
    ${sin.length?`<div style="margin-top:10px;font-size:11px;color:var(--hint)">Hay ${sin.length} hito(s) sin fecha planificada definida.</div>`:''}
  </div>`;
}

        </tr>`;
      }).join('')}</tbody></table></div></div>`;
}

// ────────────────  PESTAÑA TIMELINE EN DETALLE DE PROYECTO  ────────────────

function renderTimelineTab(hitos, proyId, p){
  const tc=document.getElementById('proj-tab-content');
  const c={vencido:0,proximo:0,completado:0,total:hitos.length};
  hitos.forEach(h=>{
    const cls=classifyHito(h);
    if(cls==='vencido')c.vencido++;
    if(cls==='proximo')c.proximo++;
    if(cls==='completado')c.completado++;
  });

  const sorted=[...hitos].sort((a,b)=>(a.fecha_planificada||'9999').localeCompare(b.fecha_planificada||'9999'));

  tc.innerHTML=`
    <div class="section-head">
      <h2>Timeline y hitos del proyecto</h2>
      ${canEdit(p)?`<button class="btn-primary" onclick="openHitoForm(null,'${proyId}')">+ Agregar hito</button>`:''}
    </div>

    <div class="metric-grid" style="grid-template-columns:repeat(4,minmax(0,1fr));margin-bottom:1rem">
      <div class="metric-card"><div class="lbl">Total hitos</div><div class="val">${c.total}</div></div>
      <div class="metric-card"><div class="lbl">Vencidos</div><div class="val" style="color:${c.vencido?'var(--rd)':'var(--gd)'}">${c.vencido}</div></div>
      <div class="metric-card"><div class="lbl">Próximos (≤14 días)</div><div class="val" style="color:${c.proximo?'var(--ad)':'var(--gd)'}">${c.proximo}</div></div>
      <div class="metric-card"><div class="lbl">Completados</div><div class="val" style="color:var(--gd)">${c.completado}</div></div>
    </div>

    ${sorted.length?`
    <div class="card" style="margin-bottom:1rem">
      <div class="card-title">Línea cronológica</div>
      ${renderVerticalTimeline(sorted,p,proyId)}
    </div>

    <div class="card"><div class="card-title">Listado</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Hito</th><th>Categoría</th><th>Fecha plan.</th><th>Fecha real</th><th>Estado</th><th>Criticidad</th><th>Responsable</th><th style="text-align:center">Días</th><th></th></tr></thead>
        <tbody>${sorted.map(h=>{
          const cls=classifyHito(h);
          const dt=daysTo(h.fecha_planificada);
          const dtStr=dt===null?'—':dt<0?`<span style="color:var(--rd);font-weight:600">${dt}</span>`:dt<=7?`<span style="color:var(--ad);font-weight:600">${dt}</span>`:dt;
          const sem=cls==='vencido'?'🔴':cls==='proximo'?'🟠':cls==='completado'?'🟢':'⚪';
          return `<tr>
            <td>${sem} <strong style="font-size:13px">${esc(h.nombre||'')}</strong>${h.descripcion?`<div style="font-size:11px;color:var(--muted);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(h.descripcion)}</div>`:''}</td>
            <td style="font-size:12px">${esc(h.categoria||'—')}</td>
            <td style="font-size:12px">${fmtDate(h.fecha_planificada)}</td>
            <td style="font-size:12px">${fmtDate(h.fecha_real)}</td>
            <td><span class="badge ${HITO_BADGE[h.estado]||'pendiente'}">${esc(h.estado||'—')}</span></td>
            <td><span class="badge ${CRITICIDAD_BADGE[h.criticidad]||'activo'}">${esc(h.criticidad||'—')}</span></td>
            <td style="font-size:12px">${esc(h.responsable||'—')}</td>
            <td style="text-align:center;font-size:12px">${dtStr}</td>
            <td class="action-row">
              ${canEdit(p)?`<button class="icon-btn" onclick="openHitoForm('${h.id}','${proyId}')">✏️</button>`:''}
              ${isCoord()?`<button class="icon-btn del" onclick="confirmDelete('hitos_proyecto','${h.id}')">🗑</button>`:''}
            </td>
          </tr>`;
        }).join('')}</tbody></table></div>
    </div>`:`<div class="empty">Este proyecto aún no tiene hitos registrados.${canEdit(p)?' Agrega el primer hito para empezar a construir la línea de tiempo.':''}</div>`}
  `;
}

/** Línea vertical de tiempo sencilla y elegante, ordenada por fecha. */
function renderVerticalTimeline(sorted, p, proyId){
  const dotColor=(cls,crit)=>{
    if(cls==='completado')return '#639922';
    if(cls==='vencido')return '#A32D2D';
    if(cls==='proximo')return '#BA7517';
    if(cls==='cancelado')return '#9A9991';
    if(crit==='Crítica')return '#A32D2D';
    if(crit==='Alta')return '#BA7517';
    return '#7F77DD';
  };
  return `<div style="position:relative;padding-left:28px">
    <div style="position:absolute;left:12px;top:6px;bottom:6px;width:2px;background:linear-gradient(to bottom,var(--border),var(--border) 98%,transparent)"></div>
    ${sorted.map(h=>{
      const cls=classifyHito(h);
      const col=dotColor(cls,h.criticidad);
      const dt=daysTo(h.fecha_planificada);
      const dtTxt=dt===null?'':dt<0?`(vencido hace ${-dt} días)`:dt===0?'(hoy)':`(en ${dt} días)`;
      return `<div style="position:relative;padding:10px 0 10px 0">
        <span style="position:absolute;left:-22px;top:12px;width:12px;height:12px;border-radius:50%;background:${col};border:2px solid var(--card);box-shadow:0 0 0 2px ${col}"></span>
        <div style="display:flex;justify-content:space-between;gap:12px;flex-wrap:wrap;align-items:flex-start">
          <div style="flex:1;min-width:200px">
            <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
              <strong style="font-size:13px">${esc(h.nombre||'')}</strong>
              <span class="badge ${HITO_BADGE[h.estado]||'pendiente'}">${esc(h.estado||'—')}</span>
              ${h.criticidad&&h.criticidad!=='Media'?`<span class="badge ${CRITICIDAD_BADGE[h.criticidad]||'activo'}">${esc(h.criticidad)}</span>`:''}
            </div>
            ${h.descripcion?`<div style="font-size:12px;color:var(--muted);margin-top:3px">${esc(h.descripcion)}</div>`:''}
          </div>
          <div style="text-align:right;font-size:12px;color:var(--muted);min-width:180px">
            <div>📅 plan: <strong style="color:var(--text)">${fmtDate(h.fecha_planificada)}</strong> <span style="color:var(--hint);font-size:11px">${dtTxt}</span></div>
            ${h.fecha_real?`<div>✅ real: <strong style="color:var(--gd)">${fmtDate(h.fecha_real)}</strong></div>`:''}
            ${h.responsable?`<div style="font-size:11px">👤 ${esc(h.responsable)}</div>`:''}
          </div>
        </div>
      </div>`;
    }).join('')}
  </div>`;
}

// ────────────────  FORMULARIO DE HITO  ────────────────

async function openHitoForm(id=null, proyId=null){
  let h={};
  if(id){
    const{data}=await sb.from('hitos_proyecto').select('*').eq('id',id).single();
    h=data||{};proyId=h.proyecto_id;
  }
  const selCat=(v)=>`<select id="hf-cat"><option value="">— Seleccionar —</option>${(app.lists['hito_categoria']||[]).map(o=>`<option${o===v?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
  const selEst=(v)=>`<select id="hf-estado">${(app.lists['hito_estado']||['Pendiente','En proceso','Completado','Atrasado','Cancelado']).map(o=>`<option${o===(v||'Pendiente')?' selected':''}>${esc(o)}</option>`).join('')}</select>`;
  const selCrit=(v)=>`<select id="hf-crit">${(app.lists['hito_criticidad']||['Baja','Media','Alta','Crítica']).map(o=>`<option${o===(v||'Media')?' selected':''}>${esc(o)}</option>`).join('')}</select>`;

  document.getElementById('modal-hito-body').innerHTML=`
    <h2>${id?'✏️ Editar hito':'➕ Nuevo hito'}</h2>
    <div class="form-grid">
      <div class="field full"><label>Nombre del hito *</label><input type="text" id="hf-nombre" value="${esc(h.nombre||'')}" placeholder="Ej. Energización, Acta de recepción..."></div>
      <div class="field full"><label>Descripción</label><textarea id="hf-desc" rows="2">${esc(h.descripcion||'')}</textarea></div>
      <div class="field"><label>Categoría</label>${selCat(h.categoria||'')}</div>
      <div class="field"><label>Criticidad</label>${selCrit(h.criticidad)}</div>
      <div class="field"><label>Fecha planificada</label><input type="date" id="hf-fplan" value="${h.fecha_planificada||''}"></div>
      <div class="field"><label>Fecha real</label><input type="date" id="hf-freal" value="${h.fecha_real||''}"></div>
      <div class="field"><label>Estado</label>${selEst(h.estado)}</div>
      <div class="field"><label>Responsable</label><input type="text" id="hf-resp" value="${esc(h.responsable||'')}"></div>
      <div class="field"><label>Dependencia</label><input type="text" id="hf-dep" value="${esc(h.dependencia||'')}" placeholder="Opcional"></div>
      <div class="field"><label>Orden</label><input type="number" id="hf-orden" value="${h.orden||0}"></div>
      <div class="field full"><label>Observaciones</label><textarea id="hf-obs" rows="2">${esc(h.observaciones||'')}</textarea></div>
    </div>
    <div class="form-actions">
      <button class="btn-ghost" onclick="closeM('modal-hito')">Cancelar</button>
      <button class="btn-primary" onclick="saveHito('${id||''}','${proyId}')">💾 Guardar</button>
    </div>`;
  openM('modal-hito');
}

async function saveHito(id, proyId){
  const nombre=v('hf-nombre');
  if(!nombre)return toast('El nombre es obligatorio.',true);
  const payload={
    proyecto_id: proyId,
    nombre: nombre,
    descripcion: v('hf-desc')||null,
    categoria: v('hf-cat')||null,
    fecha_planificada: v('hf-fplan')||null,
    fecha_real: v('hf-freal')||null,
    estado: v('hf-estado')||'Pendiente',
    criticidad: v('hf-crit')||'Media',
    responsable: v('hf-resp')||null,
    dependencia: v('hf-dep')||null,
    orden: parseInt(v('hf-orden'))||0,
    observaciones: v('hf-obs')||null,
    updated_at: new Date().toISOString()
  };
  const{error}=id
    ? await sb.from('hitos_proyecto').update(payload).eq('id',id)
    : await sb.from('hitos_proyecto').insert(payload);
  if(error)return toast('Error: '+error.message,true);
  closeM('modal-hito');toast(id?'Hito actualizado.':'Hito creado.');
  // Recargar donde corresponda
  if(app.view==='timeline')render();
  else nav('proyecto_detalle',{projectId:proyId});
}

// Mini map se renderiza desde renderProjGeneral vía initMiniMap()
function initMiniMap(){
  setTimeout(()=>{
    const{p}=window._projDetail||{};
    if(p?.lat&&p?.lon&&document.getElementById('mini-map-div')){
      if(window._miniMap){window._miniMap.remove();window._miniMap=null;}
      const m=L.map('mini-map-div').setView([p.lat,p.lon],13);window._miniMap=m;
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(m);
      L.circleMarker([p.lat,p.lon],{radius:10,fillColor:'#7F77DD',color:'#fff',weight:2,fillOpacity:.9}).addTo(m).bindPopup(p.nombre).openPopup();
    }
  },250);
}
